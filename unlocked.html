<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Force Awakens</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:'Orbitron',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}
#bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,#1a0a2a 0%,#080410 60%,#000 100%);}
.star{position:absolute;background:#fff;border-radius:50%;}

/* Page */
.page{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}

/* Intro phase */
#phase-intro{opacity:0;transition:opacity 1s ease;}
#phase-intro.show{opacity:1;}
.intro-flash{
  width:4px;height:4px;border-radius:50%;background:#fff;
  box-shadow:0 0 20px 4px rgba(255,255,255,0.9),0 0 60px 10px rgba(180,120,255,0.5);
  animation:pulse 2s ease-in-out infinite;
  margin:0 auto 60px;
}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(2);}}
.intro-title{
  font-family:'Cinzel',serif;font-size:clamp(14px,4vw,20px);
  letter-spacing:0.2em;color:rgba(255,255,255,0.9);
  margin-bottom:16px;
}
.intro-sub{
  font-family:'Cinzel',serif;font-style:italic;
  font-size:clamp(13px,3.5vw,17px);
  color:rgba(255,255,255,0.5);line-height:1.7;
  max-width:360px;
}

/* Reveal phase */
#phase-reveal{opacity:0;transition:opacity 1s ease;pointer-events:none;}
#phase-reveal.show{opacity:1;pointer-events:auto;}
.reveal-eye{font-size:9px;letter-spacing:0.5em;color:rgba(200,150,255,0.7);margin-bottom:24px;}
.reveal-title{
  font-family:'Cinzel',serif;font-size:clamp(24px,7vw,38px);
  letter-spacing:0.1em;color:#CC88FF;
  text-shadow:0 0 40px rgba(200,120,255,0.6);
  margin-bottom:12px;
}
.reveal-sub{
  font-family:'Cinzel',serif;font-style:italic;
  font-size:clamp(14px,3.5vw,18px);color:rgba(255,255,255,0.5);
  margin-bottom:48px;line-height:1.6;
}

/* Character cards */
.char-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:380px;width:100%;margin-bottom:40px;}
.char-card{
  background:rgba(200,120,255,0.06);
  border:1px solid rgba(200,120,255,0.2);
  border-radius:8px;padding:16px 12px;
  opacity:0;transform:translateY(20px);
  transition:all 0.6s ease;
}
.char-card.show{opacity:1;transform:translateY(0);}
.char-card-img{
  width:60px;height:60px;border-radius:50%;
  background:rgba(200,120,255,0.1);
  border:1px solid rgba(200,120,255,0.25);
  margin:0 auto 10px;overflow:hidden;
}
.char-card-img img{width:100%;height:100%;object-fit:cover;}
.char-card-name{
  font-family:'Cinzel',serif;font-size:11px;
  letter-spacing:0.08em;color:#fff;
}

/* Continue button */
.continue-btn{
  padding:16px 40px;font-family:'Orbitron',sans-serif;
  font-size:11px;letter-spacing:0.35em;
  color:#000;background:#CC88FF;border:none;border-radius:4px;
  cursor:pointer;-webkit-appearance:none;
  box-shadow:0 0 28px rgba(200,120,255,0.5);
  opacity:0;transition:opacity 0.6s ease;
  -webkit-tap-highlight-color:transparent;
}
.continue-btn.show{opacity:1;}
.continue-btn:active{background:#DD99FF;}

/* Particle canvas */
#particles{position:fixed;inset:0;z-index:1;pointer-events:none;}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="particles"></canvas>

<div class="page">

  <!-- Phase 1: Intro -->
  <div id="phase-intro">
    <div class="intro-flash"></div>
    <div class="intro-title" id="intro-title">YOU HAVE FOUND THEM ALL.</div>
    <div class="intro-sub">Every character in the galaxy has been discovered. The Force has one final gift for you.</div>
  </div>

  <!-- Phase 2: Reveal -->
  <div id="phase-reveal">
    <div class="reveal-eye">✦ THE FORCE AWAKENS ✦</div>
    <div class="reveal-title">4 NEW VOICES</div>
    <div class="reveal-sub">These heroes of the galaxy now answer when you call.</div>
    <div class="char-cards" id="char-cards">
      <!-- Injected by JS -->
    </div>
    <button class="continue-btn" id="continue-btn" onclick="continueToResult()">CONTINUE →</button>
  </div>

</div>

<script>
/* ============================================================
   UNLOCKED.HTML — cinematic reveal of 4 new characters
   ============================================================ */
var NEW_CHARS = [
  { id:'rey',    name:'Rey',          img:'./rey.png' },
  { id:'ahsoka', name:'Ahsoka Tano',  img:'./ahsoka.png' },
  { id:'leia',   name:'Leia Organa',  img:'./leia.png' },
  { id:'padme',  name:'Padmé Amidala',img:'./padme.png' },
];

/* ---- Stars ---- */
(function() {
  var bg = document.getElementById('bg');
  for (var i = 0; i < 100; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var sz = Math.random() * 1.8 + 0.4;
    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;opacity:'+(Math.random()*0.6+0.2).toFixed(2);
    bg.appendChild(s);
  }
})();

/* ---- Particles ---- */
var canvas = document.getElementById('particles');
var ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
var particles = [];
function spawnParticle() {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 3 + 1,
    vx: (Math.random()-0.5)*0.8,
    vy: (Math.random()-0.5)*0.8,
    life: 1, decay: 0.004 + Math.random()*0.006,
    color: Math.random() > 0.5 ? '#CC88FF' : '#FFFFFF'
  });
}
function particleLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (Math.random() < 0.3) spawnParticle();
  particles = particles.filter(function(p) {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.life <= 0) return false;
    ctx.globalAlpha = p.life * 0.6;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    return true;
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(particleLoop);
}
particleLoop();

/* ---- Personalize ---- */
function init() {
  var playerName = '';
  try { playerName = localStorage.getItem('sw_player_name') || ''; } catch(e) {}
  if (playerName) {
    var dn = playerName.charAt(0).toUpperCase() + playerName.slice(1).toLowerCase();
    document.getElementById('intro-title').textContent = dn.toUpperCase() + ', YOU HAVE FOUND THEM ALL.';
  }

  /* Build character cards */
  var cards = document.getElementById('char-cards');
  NEW_CHARS.forEach(function(c) {
    var card = document.createElement('div');
    card.className = 'char-card';
    card.id = 'card-' + c.id;
    var imgDiv = document.createElement('div');
    imgDiv.className = 'char-card-img';
    var img = document.createElement('img');
    img.alt = c.name;
    /* Try loading portrait */
    var base = './assets/characters/';
    var srcs = [base+c.id+'.png', base+c.id+'.PNG', c.img, c.img.replace('.png','.PNG')];
    var si = 0;
    function tryImg() {
      if (si >= srcs.length) return;
      var x = new Image();
      x.onload = function() { img.src = srcs[si-1]; };
      x.onerror = function() { si++; tryImg(); };
      x.src = srcs[si++];
    }
    tryImg();
    imgDiv.appendChild(img);
    var name = document.createElement('div');
    name.className = 'char-card-name';
    name.textContent = c.name;
    card.appendChild(imgDiv);
    card.appendChild(name);
    cards.appendChild(card);
  });

  /* Sequence: intro → reveal → cards → button */
  setTimeout(function() {
    document.getElementById('phase-intro').classList.add('show');
  }, 300);

  setTimeout(function() {
    document.getElementById('phase-intro').style.opacity = '0';
    setTimeout(function() {
      document.getElementById('phase-intro').style.display = 'none';
      document.getElementById('phase-reveal').classList.add('show');

      /* Reveal cards one by one */
      var delay = 400;
      NEW_CHARS.forEach(function(c, i) {
        setTimeout(function() {
          var card = document.getElementById('card-' + c.id);
          if (card) card.classList.add('show');
        }, delay + i * 280);
      });

      /* Show continue button after all cards */
      setTimeout(function() {
        document.getElementById('continue-btn').classList.add('show');
      }, delay + NEW_CHARS.length * 280 + 400);

    }, 800);
  }, 4000);
}

function continueToResult() {
  /* Navigate to the result page that was queued */
  var params = new URLSearchParams(window.location.search);
  var next = params.get('next') || './index.html';
  window.location.href = next;
}

window.addEventListener('load', init);
</script>
</body>
</html>
