<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Battle Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<script src="./audio.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:'Orbitron',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none;}

/* Background */
#bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,#100510 0%,#05020a 60%,#000 100%);}
.star{position:absolute;background:#fff;border-radius:50%;}
#arena-glow{position:fixed;inset:0;pointer-events:none;}

/* ============================================================
   SCREEN SYSTEM
   ============================================================ */
.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));}
.screen.active{display:flex;}

/* ============================================================
   SCREEN 1 — SETUP
   Who is Player 2?
   ============================================================ */
#screen-setup{}
.setup-eye{font-size:9px;letter-spacing:0.45em;color:rgba(255,80,80,0.7);margin-bottom:20px;}
.setup-title{font-family:'Cinzel',serif;font-size:clamp(24px,7vw,38px);letter-spacing:0.1em;color:#FF4444;text-shadow:0 0 30px rgba(255,68,68,0.5);margin-bottom:12px;}
.setup-sub{font-family:'Cinzel',serif;font-style:italic;font-size:clamp(13px,3.5vw,17px);color:rgba(255,255,255,0.5);margin-bottom:48px;line-height:1.6;}

.player-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:440px;margin-bottom:40px;}
.player-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;padding:20px 12px;text-align:center;
}
.player-card.p1{border-color:rgba(68,221,255,0.3);background:rgba(68,221,255,0.06);}
.player-card.p2{border-color:rgba(255,68,68,0.3);background:rgba(255,68,68,0.06);}
.pc-label{font-size:8px;letter-spacing:0.4em;margin-bottom:10px;}
.p1 .pc-label{color:rgba(68,221,255,0.7);}
.p2 .pc-label{color:rgba(255,68,68,0.7);}
.pc-img{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);margin:0 auto 10px;overflow:hidden;}
.pc-img img{width:100%;height:100%;object-fit:cover;}
.pc-name{font-family:'Cinzel',serif;font-size:12px;color:#fff;margin-bottom:4px;}
.pc-char{font-size:9px;letter-spacing:0.2em;color:rgba(255,255,255,0.4);}

.p2-input-wrap{text-align:center;margin-bottom:16px;}
.p2-label{font-size:9px;letter-spacing:0.35em;color:rgba(255,68,68,0.6);margin-bottom:10px;}
#p2-name-input{
  width:min(200px,70vw);padding:10px 16px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,68,68,0.3);
  border-radius:4px;color:#fff;font-family:'Orbitron',sans-serif;
  font-size:14px;text-align:center;letter-spacing:0.2em;
  text-transform:uppercase;outline:none;-webkit-appearance:none;
  caret-color:#FF4444;
}
#p2-name-input::placeholder{color:rgba(255,100,100,0.3);letter-spacing:0.2em;}

.battle-start-btn{
  padding:16px 40px;font-family:'Orbitron',sans-serif;
  font-size:11px;letter-spacing:0.35em;
  color:#000;background:#FF4444;border:none;border-radius:4px;
  cursor:pointer;-webkit-appearance:none;
  box-shadow:0 0 28px rgba(255,68,68,0.5);
  transition:all 0.2s;
}
.battle-start-btn:active{background:#FF6666;}
.battle-start-btn:disabled{opacity:0.3;}

/* ============================================================
   SCREEN 2 — BATTLE ARENA
   ============================================================ */
#screen-battle{justify-content:space-between;padding-top:max(16px,env(safe-area-inset-top));}

/* Two fighter panels */
.fighters{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:480px;flex-shrink:0;}
.fighter{
  border-radius:8px;padding:12px;text-align:center;
  position:relative;overflow:hidden;
}
.f1{background:rgba(68,221,255,0.06);border:1px solid rgba(68,221,255,0.25);}
.f2{background:rgba(255,68,68,0.06);border:1px solid rgba(255,68,68,0.25);}
.fighter-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.1em;color:rgba(255,255,255,0.7);margin-bottom:6px;}
.fighter-char{font-size:9px;letter-spacing:0.2em;margin-bottom:8px;}
.f1 .fighter-char{color:rgba(68,221,255,0.7);}
.f2 .fighter-char{color:rgba(255,68,68,0.7);}
.fighter-img{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);margin:0 auto 8px;overflow:hidden;}
.fighter-img img{width:100%;height:100%;object-fit:cover;}
.fighter-hp-wrap{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.fighter-hp{height:100%;border-radius:3px;transition:width 0.3s ease;}
.f1 .fighter-hp{background:#44DDFF;}
.f2 .fighter-hp{background:#FF4444;}
.fighter-hp-num{font-size:8px;letter-spacing:0.2em;color:rgba(255,255,255,0.4);margin-top:4px;}

/* VS divider */
.vs-center{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:clamp(28px,8vw,44px);
  font-weight:700;color:#FF4444;
  text-shadow:0 0 30px rgba(255,68,68,0.7);
  letter-spacing:0.05em;
  flex-shrink:0;margin:8px 0;
}
.vs-round{font-size:9px;letter-spacing:0.4em;color:rgba(255,255,255,0.4);margin-top:4px;}

/* Battle arena — main tap zone */
#battle-arena{
  flex:1;width:100%;max-width:480px;
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:12px;overflow:hidden;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  cursor:pointer;min-height:120px;
}

/* Crossed sabers */
.saber-wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.saber{
  position:absolute;
  width:4px;border-radius:2px;
  transform-origin:bottom center;
  box-shadow:0 0 8px currentColor;
}
.saber-1{
  height:140px;
  background:linear-gradient(to top,rgba(68,221,255,0.3),#44DDFF,#fff);
  color:#44DDFF;
  transform:rotate(-35deg) translateX(-30px);
  bottom:50%;left:50%;
  margin-left:-2px;
}
.saber-2{
  height:140px;
  background:linear-gradient(to top,rgba(255,68,68,0.3),#FF4444,#fff);
  color:#FF4444;
  transform:rotate(35deg) translateX(30px);
  bottom:50%;right:50%;
  margin-right:-2px;
}
.arena-instruction{
  font-family:'Cinzel',serif;font-style:italic;
  font-size:clamp(14px,3.5vw,17px);
  color:rgba(255,255,255,0.6);
  position:relative;z-index:2;text-align:center;padding:0 20px;
  pointer-events:none;
}
.tap-hint{
  font-size:9px;letter-spacing:0.35em;color:rgba(255,255,255,0.3);
  margin-top:8px;
  pointer-events:none;
  position:relative;z-index:2;
}

/* Clash flash effect */
#clash-flash{
  position:absolute;inset:0;
  background:radial-gradient(circle at center,rgba(255,255,255,0.8),transparent 60%);
  opacity:0;pointer-events:none;
  border-radius:12px;
}
.clash-flash-anim{animation:clash-flash-anim 0.3s ease-out forwards;}
@keyframes clash-flash-anim{0%{opacity:1;}100%{opacity:0;}}

/* Tap button */
#tap-btn{
  width:100%;padding:18px;
  font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:0.3em;
  border:none;border-radius:8px;cursor:pointer;
  -webkit-appearance:none;transition:all 0.1s;
  flex-shrink:0;margin-top:8px;
  color:#000;
}
.tap-p1{background:#44DDFF;box-shadow:0 0 20px rgba(68,221,255,0.4);}
.tap-p2{background:#FF4444;box-shadow:0 0 20px rgba(255,68,68,0.4);}
#tap-btn:active{transform:scale(0.97);}
#tap-btn:disabled{opacity:0.3;}

/* ============================================================
   SCREEN 3 — RESULT
   ============================================================ */
#screen-result{}
.result-eye{font-size:9px;letter-spacing:0.5em;margin-bottom:20px;}
.result-crown{font-size:56px;margin-bottom:16px;}
.result-winner-label{font-size:9px;letter-spacing:0.4em;margin-bottom:10px;}
.result-winner-name{font-family:'Cinzel',serif;font-size:clamp(32px,9vw,52px);letter-spacing:0.08em;color:#fff;margin-bottom:6px;}
.result-winner-char{font-size:10px;letter-spacing:0.25em;margin-bottom:32px;}
.result-winner-img{width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.3);margin:0 auto 32px;overflow:hidden;}
.result-winner-img img{width:100%;height:100%;object-fit:cover;}
.result-quote{
  font-family:'Cinzel',serif;font-style:italic;
  font-size:clamp(14px,3.5vw,18px);color:rgba(255,255,255,0.6);
  max-width:340px;line-height:1.65;margin-bottom:40px;
}
.result-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;}
.result-btn-p{
  padding:15px;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:0.3em;
  color:#000;border:none;border-radius:4px;cursor:pointer;-webkit-appearance:none;
}
.result-btn-s{
  padding:13px;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:0.3em;
  color:rgba(255,255,255,0.5);background:transparent;
  border:1px solid rgba(255,255,255,0.15);border-radius:4px;cursor:pointer;-webkit-appearance:none;
}
.result-btn-s:active{color:#fff;border-color:rgba(255,255,255,0.4);}

/* Back button */
.back-btn{
  position:fixed;top:max(20px,env(safe-area-inset-top));left:16px;z-index:100;
  padding:8px 14px;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:0.25em;
  color:rgba(255,255,255,0.4);background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.12);border-radius:4px;
  cursor:pointer;-webkit-appearance:none;transition:all 0.2s;
}
.back-btn:active{color:#fff;}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="arena-glow" style="position:fixed;inset:0;pointer-events:none;z-index:1;"></canvas>

<button class="back-btn" onclick="goBack()">← BACK</button>

<!-- ============================================================
     SCREEN 1 — SETUP
     ============================================================ -->
<section class="screen active" id="screen-setup">
  <div class="setup-eye">⚔ BATTLE MODE ⚔</div>
  <div class="setup-title">TWO WILL ENTER</div>
  <div class="setup-sub">One destiny awaits.<br>Who dares challenge you?</div>

  <div class="player-cards">
    <div class="player-card p1">
      <div class="pc-label">PLAYER 1</div>
      <div class="pc-img"><img id="p1-img" src="" alt=""></div>
      <div class="pc-name" id="p1-display-name">—</div>
      <div class="pc-char" id="p1-char-name">—</div>
    </div>
    <div class="player-card p2">
      <div class="pc-label">PLAYER 2</div>
      <div class="pc-img"><img id="p2-img" src="" alt=""></div>
      <div class="pc-name" id="p2-display-name-card">CHALLENGER</div>
      <div class="pc-char" id="p2-char-name">—</div>
    </div>
  </div>

  <div class="p2-input-wrap">
    <div class="p2-label">CHALLENGER'S NAME</div>
    <input id="p2-name-input" type="text" maxlength="12"
      autocapitalize="characters" autocomplete="off"
      autocorrect="off" spellcheck="false" placeholder="ENTER NAME"
      oninput="onP2Input()">
  </div>

  <button class="battle-start-btn" id="start-btn" onclick="startBattle()" disabled>BEGIN DUEL →</button>
</section>

<!-- ============================================================
     SCREEN 2 — BATTLE
     ============================================================ -->
<section class="screen" id="screen-battle">
  <!-- Fighters header -->
  <div class="fighters">
    <div class="fighter f1">
      <div class="fighter-name" id="b-p1-name">PLAYER 1</div>
      <div class="fighter-char" id="b-p1-char">—</div>
      <div class="fighter-img"><img id="b-p1-img" src="" alt=""></div>
      <div class="fighter-hp-wrap"><div class="fighter-hp" id="b-p1-hp" style="width:100%"></div></div>
      <div class="fighter-hp-num" id="b-p1-hp-num">100</div>
    </div>
    <div class="fighter f2">
      <div class="fighter-name" id="b-p2-name">PLAYER 2</div>
      <div class="fighter-char" id="b-p2-char">—</div>
      <div class="fighter-img"><img id="b-p2-img" src="" alt=""></div>
      <div class="fighter-hp-wrap"><div class="fighter-hp" id="b-p2-hp" style="width:100%"></div></div>
      <div class="fighter-hp-num" id="b-p2-hp-num">100</div>
    </div>
  </div>

  <!-- VS -->
  <div class="vs-center">
    VS
    <div class="vs-round" id="round-label">ROUND 1</div>
  </div>

  <!-- Arena -->
  <div id="battle-arena">
    <div class="saber-wrap">
      <div class="saber saber-1" id="saber-1"></div>
      <div class="saber saber-2" id="saber-2"></div>
    </div>
    <div class="arena-instruction" id="arena-instruction">The duel begins.</div>
    <div class="tap-hint" id="tap-hint">— TAP TO STRIKE —</div>
    <div id="clash-flash"></div>
  </div>

  <!-- Tap button -->
  <button id="tap-btn" class="tap-p1" onclick="onTap()">⚡ STRIKE</button>
</section>

<!-- ============================================================
     SCREEN 3 — RESULT
     ============================================================ -->
<section class="screen" id="screen-result">
  <div class="result-eye" id="result-eye">✦ DUEL COMPLETE ✦</div>
  <div class="result-crown" id="result-crown">🏆</div>
  <div class="result-winner-img"><img id="result-winner-img" src="" alt=""></div>
  <div class="result-winner-label" id="result-winner-label">VICTOR</div>
  <div class="result-winner-name" id="result-winner-name">—</div>
  <div class="result-winner-char" id="result-winner-char">—</div>
  <div class="result-quote" id="result-quote"></div>
  <div class="result-btns">
    <button class="result-btn-p" id="rematch-btn" onclick="rematch()">⚔ REMATCH</button>
    <button class="result-btn-s" onclick="goBack()">← RETURN TO COCKPIT</button>
  </div>
</section>

<script>
/* ============================================================
   BATTLE MODE ENGINE
   Safari-safe: no arrow functions, no template literals
   ============================================================ */

/* ---- Character data ---- */
var CHAR_META = {
  yoda:      { name:'Yoda',            power:95, saber:'#00FF88' },
  obiwan:    { name:'Obi-Wan',         power:88, saber:'#44AAFF' },
  luke:      { name:'Luke',            power:85, saber:'#44AAFF' },
  mace:      { name:'Mace Windu',      power:90, saber:'#CC44FF' },
  poe:       { name:'Poe Dameron',     power:70, saber:'#44AAFF' },
  finn:      { name:'Finn',            power:72, saber:'#44AAFF' },
  quigon:    { name:'Qui-Gon Jinn',    power:87, saber:'#00FF88' },
  mando:     { name:'The Mandalorian', power:82, saber:'#FFFFFF' },
  boba:      { name:'Boba Fett',       power:78, saber:'#FFFFFF' },
  han:       { name:'Han Solo',        power:68, saber:'#FFFFFF' },
  chewie:    { name:'Chewbacca',       power:80, saber:'#FFFFFF' },
  vader:     { name:'Darth Vader',     power:98, saber:'#FF2233' },
  palpatine: { name:'Palpatine',       power:97, saber:'#FF2233' },
  kylo:      { name:'Kylo Ren',        power:88, saber:'#FF2233' },
  maul:      { name:'Darth Maul',      power:90, saber:'#FF2233' },
  grogu:     { name:'Grogu',           power:99, saber:'#00FF88' },
  rey:       { name:'Rey',             power:92, saber:'#44AAFF' },
  ahsoka:    { name:'Ahsoka Tano',     power:91, saber:'#FFFFFF' },
  leia:      { name:'Leia Organa',     power:75, saber:'#44AAFF' },
  padme:     { name:'Padmé Amidala',   power:70, saber:'#FF88CC' },
};

var VICTOR_QUOTES = {
  yoda:      'Size matters not. Judge me by my size, do you?',
  obiwan:    'If you strike me down, I shall become more powerful than you can possibly imagine.',
  luke:      'I am a Jedi, like my father before me.',
  mace:      'I have the high ground.',
  vader:     'I find your lack of faith disturbing.',
  palpatine: 'Do it.',
  kylo:      'I know what I have to do, but I don\'t know if I have the strength to do it.',
  maul:      'At last we will have our revenge.',
  grogu:     '...',
  mando:     'This is the way.',
  boba:      'He\'s no good to me dead.',
  han:       'Never tell me the odds.',
  chewie:    'RRRAAARRGH!',
  quigon:    'The Force will show us the way.',
  poe:       'That\'s one hell of a pilot.',
  finn:      'We have to help people.',
  rey:       'I\'m Rey. Rey Skywalker.',
  ahsoka:    'I am no Jedi.',
  leia:      'Rebellions are built on hope.',
  padme:     'So this is how liberty dies — with thunderous applause.',
};

/* ---- State ---- */
var p1 = { name:'', charId:'', hp:100, power:70 };
var p2 = { name:'', charId:'', hp:100, power:70 };
var currentAttacker = 1; /* whose turn — 1 or 2 */
var round = 1;
var battleActive = false;
var totalRounds = 7;
var p1Wins = 0;
var p2Wins = 0;

/* ---- Image loading ---- */
function loadImg(el, charId) {
  var base = './assets/characters/';
  var srcs = [base+charId+'.png', base+charId+'.PNG', './'+charId+'.png', './'+charId+'.PNG'];
  var i = 0;
  function next() {
    if (i >= srcs.length) return;
    var x = new Image();
    x.onload = function() { el.src = srcs[i-1]; };
    x.onerror = function() { i++; next(); };
    x.src = srcs[i++];
  }
  next();
}

/* ---- Stars ---- */
(function() {
  var bg = document.getElementById('bg');
  for (var i = 0; i < 80; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var sz = Math.random() * 1.5 + 0.4;
    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;opacity:'+(Math.random()*0.5+0.2).toFixed(2);
    bg.appendChild(s);
  }
})();

/* ---- Init ---- */
function init() {
  /* Load P1 from localStorage */
  var charId = '';
  var name = '';
  try {
    charId = localStorage.getItem('sw_last_result') || 'luke';
    name = localStorage.getItem('sw_player_name') || 'PLAYER 1';
  } catch(e) { charId = 'luke'; name = 'PLAYER 1'; }

  var dn = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
  p1.charId = charId;
  p1.name = dn;
  p1.power = (CHAR_META[charId] && CHAR_META[charId].power) || 75;

  /* P1 card */
  document.getElementById('p1-display-name').textContent = dn.toUpperCase();
  document.getElementById('p1-char-name').textContent = (CHAR_META[charId] && CHAR_META[charId].name) || charId;
  loadImg(document.getElementById('p1-img'), charId);

  /* P2 — needs a character too. Default if not set */
  var p2charId = '';
  try { p2charId = localStorage.getItem('sw_p2_result') || ''; } catch(e) {}
  if (p2charId && CHAR_META[p2charId]) {
    p2.charId = p2charId;
    document.getElementById('p2-char-name').textContent = CHAR_META[p2charId].name;
    loadImg(document.getElementById('p2-img'), p2charId);
    p2.power = CHAR_META[p2charId].power;
  } else {
    /* P2 hasn't taken quiz yet — assign random character */
    var keys = Object.keys(CHAR_META);
    p2.charId = keys[Math.floor(Math.random() * keys.length)];
    document.getElementById('p2-char-name').textContent = CHAR_META[p2.charId].name;
    loadImg(document.getElementById('p2-img'), p2.charId);
    p2.power = CHAR_META[p2.charId].power;
  }

  /* Saber colors from character */
  var p1Color = (CHAR_META[p1.charId] && CHAR_META[p1.charId].saber) || '#44AAFF';
  var p2Color = (CHAR_META[p2.charId] && CHAR_META[p2.charId].saber) || '#FF4444';
  document.getElementById('saber-1').style.background = 'linear-gradient(to top,rgba(0,0,0,0),' + p1Color + ',#fff)';
  document.getElementById('saber-1').style.color = p1Color;
  document.getElementById('saber-1').style.boxShadow = '0 0 12px ' + p1Color + ', 0 0 24px ' + p1Color;
  document.getElementById('saber-2').style.background = 'linear-gradient(to top,rgba(0,0,0,0),' + p2Color + ',#fff)';
  document.getElementById('saber-2').style.color = p2Color;
  document.getElementById('saber-2').style.boxShadow = '0 0 12px ' + p2Color + ', 0 0 24px ' + p2Color;

  /* Check if start btn can be enabled */
  checkStartReady();
}

function onP2Input() {
  var val = document.getElementById('p2-name-input').value.trim();
  if (val.length >= 2) {
    p2.name = val.toUpperCase();
    document.getElementById('p2-display-name-card').textContent = val.toUpperCase();
  }
  checkStartReady();
}

function checkStartReady() {
  var val = document.getElementById('p2-name-input').value.trim();
  document.getElementById('start-btn').disabled = (val.length < 2);
}

/* ============================================================
   BATTLE LOGIC
   ============================================================ */
function startBattle() {
  var val = document.getElementById('p2-name-input').value.trim();
  if (val.length < 2) return;
  p2.name = val.toUpperCase();

  /* Reset state */
  p1.hp = 100; p2.hp = 100;
  round = 1; p1Wins = 0; p2Wins = 0;
  currentAttacker = 1;
  battleActive = true;

  /* Fill battle screen */
  document.getElementById('b-p1-name').textContent = p1.name;
  document.getElementById('b-p1-char').textContent = (CHAR_META[p1.charId] && CHAR_META[p1.charId].name) || '—';
  loadImg(document.getElementById('b-p1-img'), p1.charId);
  document.getElementById('b-p2-name').textContent = p2.name;
  document.getElementById('b-p2-char').textContent = (CHAR_META[p2.charId] && CHAR_META[p2.charId].name) || '—';
  loadImg(document.getElementById('b-p2-img'), p2.charId);

  updateHPs();
  updateRoundLabel();
  setAttackerUI();

  showScreen('screen-battle');
  SWAudio.resume();
  SWAudio.playSaberIgnite('#44AAFF');
  setTimeout(function() { SWAudio.playSaberIgnite('#FF4444'); }, 300);
}

function onTap() {
  if (!battleActive) return;
  SWAudio.resume();
  SWAudio.playSaberClash();
  doClashFlash();

  /* Damage calculation */
  var attacker = currentAttacker === 1 ? p1 : p2;
  var defender = currentAttacker === 1 ? p2 : p1;
  var defMeta  = CHAR_META[defender.charId] || {};
  var atkMeta  = CHAR_META[attacker.charId] || {};

  /* Base damage 8-18, modified by power differential */
  var powerDiff = (atkMeta.power || 75) - (defMeta.power || 75);
  var base = 8 + Math.floor(Math.random() * 11);
  var dmg = Math.max(3, Math.min(25, base + Math.floor(powerDiff * 0.15)));

  /* Critical hit 15% chance */
  var isCrit = Math.random() < 0.15;
  if (isCrit) { dmg = Math.floor(dmg * 1.8); }

  defender.hp = Math.max(0, defender.hp - dmg);
  updateHPs();

  /* Commentary */
  var msgs = isCrit ?
    ['A critical blow!', 'Devastating strike!', 'The Force strikes true!', 'CRITICAL HIT!'] :
    ['The sabers clash!', 'A powerful strike!', 'They exchange blows!', 'The duel rages on!', 'Strike!'];
  var msg = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('arena-instruction').textContent = msg;

  /* Check for round end */
  if (defender.hp <= 0) {
    endRound(currentAttacker);
  } else {
    /* Switch attacker */
    currentAttacker = currentAttacker === 1 ? 2 : 1;
    setAttackerUI();
  }
}

function endRound(winner) {
  battleActive = false;
  if (winner === 1) { p1Wins++; } else { p2Wins++; }

  var winnerName = winner === 1 ? p1.name : p2.name;
  document.getElementById('arena-instruction').textContent = winnerName + ' wins this round!';
  document.getElementById('tap-btn').disabled = true;

  setTimeout(function() {
    /* Check for match winner */
    var roundsNeeded = Math.ceil(totalRounds / 2);
    if (p1Wins >= roundsNeeded || p2Wins >= roundsNeeded) {
      showWinner(p1Wins > p2Wins ? 1 : 2);
    } else {
      /* Next round */
      round++;
      p1.hp = 100; p2.hp = 100;
      currentAttacker = winner; /* winner attacks first next round */
      battleActive = true;
      document.getElementById('tap-btn').disabled = false;
      updateHPs();
      updateRoundLabel();
      setAttackerUI();
      SWAudio.playSaberIgnite(
        winner === 1 ?
          ((CHAR_META[p1.charId] && CHAR_META[p1.charId].saber) || '#44AAFF') :
          ((CHAR_META[p2.charId] && CHAR_META[p2.charId].saber) || '#FF4444')
      );
    }
  }, 1800);
}

function showWinner(winner) {
  var winP = winner === 1 ? p1 : p2;
  var winColor = winner === 1 ? '#44DDFF' : '#FF4444';
  var charId = winP.charId;
  var charMeta = CHAR_META[charId] || {};

  document.getElementById('result-eye').textContent = '\u2756 DUEL COMPLETE \u2756';
  document.getElementById('result-eye').style.color = winColor;
  document.getElementById('result-crown').textContent = winner === 1 ? '\uD83C\uDFC6' : '\u2694\uFE0F';
  document.getElementById('result-winner-label').textContent = 'VICTOR';
  document.getElementById('result-winner-label').style.color = winColor;
  document.getElementById('result-winner-name').textContent = winP.name;
  document.getElementById('result-winner-char').textContent = charMeta.name || charId;
  document.getElementById('result-winner-char').style.color = winColor;

  var quote = VICTOR_QUOTES[charId] || 'The Force is strong with this one.';
  document.getElementById('result-quote').textContent = '\u201c' + quote + '\u201d';

  loadImg(document.getElementById('result-winner-img'), charId);

  var rematchBtn = document.getElementById('rematch-btn');
  rematchBtn.style.background = winColor;

  showScreen('screen-result');
  SWAudio.playForceChime();
}

/* ============================================================
   UI HELPERS
   ============================================================ */
function updateHPs() {
  var p1Pct = Math.max(0, p1.hp);
  var p2Pct = Math.max(0, p2.hp);
  document.getElementById('b-p1-hp').style.width = p1Pct + '%';
  document.getElementById('b-p2-hp').style.width = p2Pct + '%';
  document.getElementById('b-p1-hp-num').textContent = p1Pct;
  document.getElementById('b-p2-hp-num').textContent = p2Pct;
}

function updateRoundLabel() {
  document.getElementById('round-label').textContent = 'ROUND ' + round + ' OF ' + totalRounds;
}

function setAttackerUI() {
  var isP1Turn = currentAttacker === 1;
  var attacker = isP1Turn ? p1 : p2;
  var charColor = isP1Turn ?
    ((CHAR_META[p1.charId] && CHAR_META[p1.charId].saber) || '#44AAFF') :
    ((CHAR_META[p2.charId] && CHAR_META[p2.charId].saber) || '#FF4444');

  var btn = document.getElementById('tap-btn');
  btn.textContent = '\u26A1 ' + attacker.name + ' — STRIKE';
  btn.className = isP1Turn ? 'tap-p1' : 'tap-p2';
  btn.style.background = charColor;
  btn.style.boxShadow = '0 0 20px ' + charColor.replace(')', ',0.5)').replace('#','rgba(').replace(/^rgba\(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/i, function(m,r,g,b){return 'rgba('+parseInt(r,16)+','+parseInt(g,16)+','+parseInt(b,16);}) + ')';

  document.getElementById('arena-instruction').textContent = attacker.name + '\'s turn to strike!';
}

function doClashFlash() {
  var flash = document.getElementById('clash-flash');
  flash.classList.remove('clash-flash-anim');
  void flash.offsetWidth; /* reflow */
  flash.classList.add('clash-flash-anim');
}

function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) {
    screens[i].classList.remove('active');
  }
  document.getElementById(id).classList.add('active');
}

function rematch() {
  p1.hp = 100; p2.hp = 100;
  round = 1; p1Wins = 0; p2Wins = 0;
  currentAttacker = 1;
  battleActive = true;
  updateHPs();
  updateRoundLabel();
  setAttackerUI();
  showScreen('screen-battle');
  SWAudio.playSaberIgnite('#44AAFF');
  setTimeout(function() { SWAudio.playSaberIgnite('#FF4444'); }, 300);
}

function goBack() {
  window.location.href = './index.html';
}

window.addEventListener('load', init);
</script>
</body>
</html>
