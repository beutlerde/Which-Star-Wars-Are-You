<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>404 — A Disturbance in the Force</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:'Orbitron',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
#bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 60%,#0a1a0a 0%,#020802 60%,#000 100%);}
.star{position:absolute;background:#fff;border-radius:50%;}
.page{position:relative;z-index:2;text-align:center;padding:40px 32px;max-width:480px;}
.yoda-img{width:140px;height:140px;border-radius:50%;background:rgba(100,180,100,0.1);border:1px solid rgba(100,200,100,0.2);margin:0 auto 32px;display:flex;align-items:center;justify-content:center;font-size:72px;}
.error-code{font-size:9px;letter-spacing:0.5em;color:rgba(100,220,100,0.5);margin-bottom:16px;}
.yoda-quote{font-family:'Cinzel',serif;font-style:italic;font-size:clamp(18px,5vw,26px);line-height:1.5;color:#fff;text-shadow:0 0 20px rgba(100,220,100,0.3);margin-bottom:12px;letter-spacing:0.03em;}
.yoda-attr{font-size:10px;letter-spacing:0.3em;color:rgba(100,220,100,0.6);margin-bottom:48px;}
.back-btn{display:inline-block;padding:14px 36px;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:0.35em;color:#000;background:#44FF99;border:none;border-radius:4px;cursor:pointer;-webkit-appearance:none;text-decoration:none;transition:all 0.2s;box-shadow:0 0 24px rgba(68,255,153,0.4);}
.back-btn:active{background:#66FFAA;}
</style>
</head>
<body>
<div id="bg"></div>
<div class="page">
  <div class="yoda-img">🧙</div>
  <div class="error-code">DISTURBANCE IN THE FORCE // CODE 404</div>
  <div class="yoda-quote" id="quote"></div>
  <div class="yoda-attr">— Master Yoda</div>
  <a class="back-btn" href="./index.html">RETURN TO COCKPIT</a>
</div>
<script>
var QUOTES = [
  'Lost, this page is. Found again, it cannot be.',
  'Exist, this destination does not. Seek elsewhere, you must.',
  'Hmmmm. Gone, this page has. Return to the cockpit, you should.',
  'A path that leads nowhere, you have followed. Back you must go.',
  'Not here, what you seek is. The Force will guide you… elsewhere.',
  'Searched everywhere, I have. This page, I cannot find.',
  'Like a Jedi in fog, lost you are. Clear your mind. Return home.',
];
document.getElementById('quote').textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];

(function() {
  var bg = document.getElementById('bg');
  for (var i = 0; i < 80; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var sz = Math.random() * 1.5 + 0.5;
    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;opacity:'+(Math.random()*0.6+0.2).toFixed(2);
    bg.appendChild(s);
  }
})();
</script>
</body>
</html>
