<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Star Wars — Which Character Are You?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000008;
  -webkit-font-smoothing:antialiased;
  user-select:none; -webkit-user-select:none;
  font-family:'Rajdhani',sans-serif;
  cursor:none; /* hide default cursor — TIE fighter takes over */
}

/* ============================================================
   LAYERS
   ============================================================ */
#bg {
  position:fixed; inset:0; z-index:1;
  background:
    radial-gradient(ellipse 160% 80% at 30% 60%, #0A0520 0%, transparent 55%),
    radial-gradient(ellipse 120% 60% at 80% 20%, #050D1F 0%, transparent 50%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #02061A 0%, #000008 100%);
}
#nebula-layer { position:fixed; inset:0; z-index:2; pointer-events:none; will-change:transform; }
#stars-far    { position:fixed; inset:0; z-index:3; pointer-events:none; will-change:transform; }
#stars-near   { position:fixed; inset:0; z-index:4; pointer-events:none; will-change:transform; }
/* Layer 5 — constellation lines canvas */
#constellation-layer { position:fixed; inset:0; z-index:5; pointer-events:none; }
#planet-layer { position:fixed; inset:0; z-index:6; pointer-events:none; will-change:transform; }
/* Layer 7 — ships */
#ship-layer   { position:fixed; inset:0; z-index:7; pointer-events:none; overflow:hidden; }
#ui-layer     { position:fixed; inset:0; z-index:9; pointer-events:none; }
#vignette     { position:fixed; inset:0; z-index:8; pointer-events:none;
  background:
    radial-gradient(ellipse 100% 40% at 50% 100%, rgba(0,0,8,0.88) 0%, transparent 100%),
    radial-gradient(ellipse 100% 25% at 50% 0%,   rgba(0,0,8,0.5)  0%, transparent 100%);
}

/* ============================================================
   STARS
   ============================================================ */
.star {
  position:absolute; border-radius:50%; background:white;
  animation: tw var(--d) var(--dl) ease-in-out infinite alternate;
}
@keyframes tw {
  from { opacity:var(--lo); transform:scale(0.6); }
  to   { opacity:var(--hi); transform:scale(1.4); }
}

/* ============================================================
   NEBULAE
   ============================================================ */
.neb {
  position:absolute; border-radius:50%;
  filter:blur(80px); pointer-events:none;
  animation: nbr var(--nd) ease-in-out infinite alternate;
}
@keyframes nbr {
  from { opacity:var(--nlo); transform:scale(1); }
  to   { opacity:var(--nhi); transform:scale(1.08); }
}

/* ============================================================
   TITLE BLOCK
   ============================================================ */
#title-wrap {
  position:absolute;
  top:0; left:0; right:0;
  padding-top: max(env(safe-area-inset-top, 12px), 52px);
  padding-left:24px; padding-right:24px;
  text-align:center;
  pointer-events:none;
}
.t-crawl {
  font-family:'Orbitron',monospace;
  font-size:7px; letter-spacing:3.5px;
  color:rgba(255,255,255,0.2);
  text-transform:uppercase; margin-bottom:8px;
  opacity:0; animation: fadeup 1s ease-out 0.3s forwards;
}
.t-greeting {
  font-family:'Rajdhani',sans-serif;
  font-size:11px; letter-spacing:3px;
  color:rgba(255,200,80,0.6);
  text-transform:uppercase; margin-bottom:5px;
  opacity:0; animation: fadeup 0.8s ease-out 0.5s forwards;
}
.t-title {
  font-family:'Orbitron',monospace;
  font-weight:900;
  font-size:clamp(22px, 8vw, 32px);
  letter-spacing:2px; text-transform:uppercase; line-height:1.15;
  color:white;
  text-shadow: 0 0 40px rgba(255,160,40,0.45), 0 0 80px rgba(255,100,0,0.15), 0 3px 8px rgba(0,0,0,0.9);
  opacity:0; animation: fadeup 1s ease-out 0.7s forwards;
}
.t-line {
  width:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,160,40,0.7), transparent);
  margin:10px auto;
  animation: linegrow 0.8s ease-out 1.4s forwards;
}
@keyframes linegrow { from{width:0;opacity:0;} to{width:60%;opacity:1;} }
.t-sub {
  font-family:'Rajdhani',sans-serif;
  font-size:10px; letter-spacing:3px;
  color:rgba(255,255,255,0.28); text-transform:uppercase;
  opacity:0; animation: fadeup 0.8s ease-out 1.8s forwards;
}
@keyframes fadeup {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ============================================================
   PLANETS
   ============================================================ */
.pw {
  position:absolute; cursor:none;
  pointer-events:all; z-index:6;
  opacity:0;
}
.pw.entered { opacity:1; }

.pg {
  position:absolute; border-radius:50%;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  filter:blur(24px); pointer-events:none;
  animation: gp var(--gd,3.5s) ease-in-out infinite alternate;
}
@keyframes gp {
  from { opacity:0.2; transform:translate(-50%,-50%) scale(0.82); }
  to   { opacity:0.5; transform:translate(-50%,-50%) scale(1.12); }
}

/* planet image — rotation applied here */
.pi {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  object-fit:contain; pointer-events:none;
  transition:filter 0.2s ease;
  filter: drop-shadow(0 0 10px var(--sc,rgba(255,255,255,0.3)));
  animation: planet-rotate var(--rot-dur, 60s) linear infinite;
}
/* Each planet rotates at its own speed, direction set per-planet */
@keyframes planet-rotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.pw.locked .pi {
  filter: drop-shadow(0 0 22px var(--sc)) brightness(1.15);
}

/* targeting reticle */
.reticle {
  position:absolute; top:50%; left:50%;
  pointer-events:none; opacity:0;
  transition:opacity 0.3s ease;
}
.pw.locked .reticle { opacity:1; }
.ret-corner {
  position:absolute; width:12px; height:12px;
  border-color:var(--rc,rgba(255,255,255,0.8));
  border-style:solid;
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.ret-tl { top:0;    left:0;  border-width:2px 0 0 2px; transform:translate(-140%,-140%); }
.ret-tr { top:0;    right:0; border-width:2px 2px 0 0; transform:translate(40%,-140%); }
.ret-bl { bottom:0; left:0;  border-width:0 0 2px 2px; transform:translate(-140%,40%); }
.ret-br { bottom:0; right:0; border-width:0 2px 2px 0; transform:translate(40%,40%); }
.pw.locked .ret-tl { transform:translate(-108%,-108%); }
.pw.locked .ret-tr { transform:translate(8%,-108%); }
.pw.locked .ret-bl { transform:translate(-108%,8%); }
.pw.locked .ret-br { transform:translate(8%,8%); }

/* tap pulse */
.pulse-ring {
  position:absolute; top:50%; left:50%; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.6);
  transform:translate(-50%,-50%) scale(0.8);
  opacity:0; pointer-events:none;
}
.pw.tapping .pulse-ring { animation:pring 0.55s ease-out forwards; }
@keyframes pring {
  from { opacity:0.9; transform:translate(-50%,-50%) scale(0.8); }
  to   { opacity:0;   transform:translate(-50%,-50%) scale(2.6); }
}

/* Tatooine — gentle warm breathe, invites tap without screaming */
#pw-tatooine .pg {
  animation: tatooine-breathe 4.5s ease-in-out infinite alternate;
}
@keyframes tatooine-breathe {
  from { opacity:0.25; transform:translate(-50%,-50%) scale(0.88); }
  to   { opacity:0.5;  transform:translate(-50%,-50%) scale(1.06); }
}

/* planet label */
.plabel {
  position:absolute; left:50%;
  transform:translateX(-50%);
  text-align:center; white-space:nowrap; pointer-events:none;
  transition:opacity 0.3s ease;
}
.pm {
  display:block; font-family:'Orbitron',monospace;
  font-weight:700; letter-spacing:2px; text-transform:uppercase;
  text-shadow:0 0 14px currentColor, 0 1px 6px rgba(0,0,0,1);
}
.ps {
  display:block; font-family:'Rajdhani',sans-serif;
  font-weight:400; letter-spacing:1.5px;
  opacity:0.6; text-shadow:0 1px 6px rgba(0,0,0,1);
}

/* ============================================================
   CONSTELLATION CANVAS
   ============================================================ */
#constellation-canvas {
  position:absolute; inset:0;
  width:100%; height:100%;
}

/* ============================================================
   PASSING SHIPS
   ============================================================ */
.ship {
  position:absolute;
  pointer-events:none;
  opacity:0;
}
.ship svg { display:block; }

/* ============================================================
   TIE FIGHTER CURSOR (desktop) / FINGER TRAIL (mobile)
   ============================================================ */
#tie-cursor {
  position:fixed; z-index:1000;
  pointer-events:none;
  width:28px; height:28px;
  top:0; left:0;
  transform:translate(-50%,-50%);
  transition:transform 0.05s linear;
  display:none; /* shown only on desktop */
}

/* Finger trail dots */
.trail-dot {
  position:fixed; z-index:999;
  border-radius:50%;
  pointer-events:none;
  background:rgba(0,200,255,0.6);
  box-shadow:0 0 6px rgba(0,200,255,0.8);
  transform:translate(-50%,-50%);
}

/* ============================================================
   INFO CARD
   ============================================================ */
#info-card {
  position:absolute; left:50%; bottom:18%;
  transform:translateX(-50%) translateY(20px);
  text-align:center; pointer-events:none;
  opacity:0; transition:all 0.4s cubic-bezier(0.34,1.2,0.64,1);
  z-index:9; white-space:nowrap;
}
#info-card.visible { opacity:1; transform:translateX(-50%) translateY(0); }
.ic-planet {
  font-family:'Orbitron',monospace; font-size:11px; letter-spacing:5px;
  text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:4px;
}
.ic-action {
  font-family:'Orbitron',monospace; font-weight:900;
  font-size:clamp(18px,5vw,24px); letter-spacing:3px;
  text-transform:uppercase; color:white;
  text-shadow:0 0 20px var(--ic-color,white), 0 2px 6px rgba(0,0,0,0.9);
}
.ic-sub {
  font-family:'Rajdhani',sans-serif; font-size:11px; letter-spacing:2px;
  color:rgba(255,255,255,0.38); text-transform:uppercase; margin-top:3px;
}
.ic-tap {
  font-family:'Orbitron',monospace; font-size:8px; letter-spacing:3px;
  color:rgba(255,255,255,0.22); text-transform:uppercase; margin-top:8px;
  animation: blink-tap 1.5s ease-in-out infinite;
}
@keyframes blink-tap { 0%,100%{opacity:0.22;} 50%{opacity:0.6;} }

/* ============================================================
   YODA HINT
   ============================================================ */
#yoda-hint {
  position:absolute; bottom:8%; left:50%;
  transform:translateX(-50%); text-align:center;
  pointer-events:none; opacity:0; transition:opacity 1.2s ease;
  z-index:9; white-space:nowrap;
}
#yoda-hint.show { opacity:1; }
.yh-quote {
  font-family:'Rajdhani',sans-serif; font-weight:500; letter-spacing:1px;
  color:rgba(0,215,255,0.45); font-style:italic;
}
.yh-attr {
  font-family:'Orbitron',monospace; font-size:7px; letter-spacing:2px;
  color:rgba(255,255,255,0.15); margin-top:4px; text-transform:uppercase;
}

/* ============================================================
   SCREEN TRANSITION — clean fade through black
   ============================================================ */
#fade-overlay {
  position:fixed; inset:0; z-index:200;
  pointer-events:none;
  background:#000008;
  opacity:0;
  transition:opacity 0.3s ease;
}
#fade-overlay.fade-in  { opacity:1; pointer-events:all; }
#fade-overlay.fade-out { opacity:0; pointer-events:none; }

/* ============================================================
   LIGHTSPEED OVERLAY
   ============================================================ */
#ls {
  position:fixed; inset:0; z-index:100;
  opacity:0; pointer-events:none; background:#000008;
}
#ls.on { opacity:1; pointer-events:all; }
#ls-canvas { position:absolute; inset:0; width:100%; height:100%; }
#ls-dest {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; transition:opacity 0.7s ease; padding:28px;
}
#ls-dest.show { opacity:1; }
#ls-pimg {
  object-fit:contain; flex-shrink:0; margin-bottom:24px;
  animation:lspp 2.2s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 30px var(--pg1)) drop-shadow(0 0 60px var(--pg2));
}
@keyframes lspp {
  from { filter:drop-shadow(0 0 20px var(--pg1)) drop-shadow(0 0 40px var(--pg2)); transform:scale(1); }
  to   { filter:drop-shadow(0 0 55px var(--pg1)) drop-shadow(0 0 110px var(--pg2)); transform:scale(1.05); }
}
.ls-planet-name {
  font-family:'Orbitron',monospace; font-size:10px; letter-spacing:6px;
  text-transform:uppercase; margin-bottom:6px; text-align:center; opacity:0.5;
}
.ls-title {
  font-family:'Orbitron',monospace; font-size:clamp(18px,6vw,28px);
  font-weight:900; letter-spacing:4px; text-transform:uppercase;
  color:white; margin-bottom:6px; text-align:center;
}
.ls-sub {
  font-family:'Rajdhani',sans-serif; font-size:12px; letter-spacing:2.5px;
  color:rgba(255,255,255,0.35); text-transform:uppercase;
  margin-bottom:40px; text-align:center;
}
/* ASSEMBLED button — border draws itself, then text fades in */
.ls-btn {
  position:relative; padding:15px 48px;
  background:rgba(255,255,255,0.05);
  border:none; border-radius:4px;
  font-family:'Orbitron',monospace; font-size:11px; font-weight:700;
  letter-spacing:4px; color:transparent; /* text invisible until assembled */
  text-transform:uppercase; cursor:pointer; -webkit-appearance:none;
  overflow:visible;
}
.ls-btn.assembled { color:white; transition:color 0.3s ease 0.4s; }
.ls-btn:active { background:rgba(255,255,255,0.14); }
/* SVG border that draws itself */
.btn-border {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none;
}
.btn-border rect {
  fill:none; stroke:rgba(255,255,255,0.25); stroke-width:1;
  stroke-dasharray:var(--perimeter, 600);
  stroke-dashoffset:var(--perimeter, 600);
  transition:stroke-dashoffset 0.5s ease;
}
.ls-btn.assembled .btn-border rect { stroke-dashoffset:0; }

</style>
</head>
<body>

<div id="bg"></div>
<div id="nebula-layer"></div>
<div id="stars-far"></div>
<div id="stars-near"></div>
<div id="constellation-layer"><canvas id="constellation-canvas"></canvas></div>
<div id="planet-layer"></div>
<div id="ship-layer"></div>
<div id="vignette"></div>

<div id="ui-layer">
  <div id="title-wrap">
    <div class="t-crawl">A long time ago in a galaxy far, far away&hellip;</div>
    <div class="t-greeting" id="t-greeting">The Force is strong with you, Guapo.</div>
    <div class="t-title">WHICH STAR WARS<br>CHARACTER ARE YOU?</div>
    <div class="t-line"></div>
    <div class="t-sub">Choose your destination</div>
  </div>
  <div id="info-card">
    <div class="ic-planet" id="ic-planet"></div>
    <div class="ic-action" id="ic-action"></div>
    <div class="ic-sub" id="ic-sub"></div>
    <div class="ic-tap">TAP TO JUMP TO HYPERSPACE</div>
  </div>
  <div id="yoda-hint">
    <div class="yh-quote" id="yh-quote"></div>
    <div class="yh-attr">&mdash; Master Yoda</div>
  </div>
</div>

<!-- TIE fighter cursor -->
<div id="tie-cursor">
  <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- TIE Fighter simplified silhouette -->
    <!-- Left wing panel -->
    <polygon points="0,4 7,10 7,18 0,24" fill="rgba(180,220,255,0.7)" stroke="rgba(0,200,255,0.9)" stroke-width="0.5"/>
    <!-- Right wing panel -->
    <polygon points="28,4 21,10 21,18 28,24" fill="rgba(180,220,255,0.7)" stroke="rgba(0,200,255,0.9)" stroke-width="0.5"/>
    <!-- Center strut left -->
    <rect x="7" y="13" width="5" height="2" fill="rgba(0,200,255,0.9)"/>
    <!-- Center strut right -->
    <rect x="16" y="13" width="5" height="2" fill="rgba(0,200,255,0.9)"/>
    <!-- Cockpit sphere -->
    <circle cx="14" cy="14" r="4" fill="rgba(20,30,50,0.95)" stroke="rgba(0,200,255,0.9)" stroke-width="1"/>
    <circle cx="14" cy="14" r="2" fill="rgba(0,200,255,0.4)"/>
    <!-- Glow -->
    <circle cx="14" cy="14" r="6" fill="none" stroke="rgba(0,200,255,0.15)" stroke-width="3"/>
  </svg>
</div>

<div id="fade-overlay"></div>

<!-- Lightspeed -->
<div id="ls">
  <canvas id="ls-canvas"></canvas>
  <div id="ls-dest">
    <img id="ls-pimg" src="" alt="">
    <div class="ls-planet-name" id="ls-pname"></div>
    <div class="ls-title" id="ls-title"></div>
    <div class="ls-sub" id="ls-sub"></div>
    <button class="ls-btn" id="ls-btn">
      <svg class="btn-border" id="btn-border-svg">
        <rect id="btn-border-rect" rx="4" ry="4"/>
      </svg>
      ENTER &rarr;
    </button>
  </div>
</div>

<script>

/* ============================================================
   GUAPO — visit count + personalized greeting
   ============================================================ */
var GUAPO_NAME = 'Guapo';
var visitKey   = 'sw_visit_count';
var visits     = 0;
try { visits = parseInt(localStorage.getItem(visitKey) || '0', 10); } catch(e){}
visits++;
try { localStorage.setItem(visitKey, visits); } catch(e){}

var greetings = [
  'The Force is strong with you, ' + GUAPO_NAME + '.',
  'Welcome back, ' + GUAPO_NAME + '. Ready for another journey?',
  'The galaxy awaits you, ' + GUAPO_NAME + '.',
  'A true Jedi returns. Welcome, ' + GUAPO_NAME + '.',
  GUAPO_NAME + '. The Force called. You answered.',
  'Master ' + GUAPO_NAME + '. Your skill grows.',
  'The stars remember you, ' + GUAPO_NAME + '.'
];
var specialGreetings = {
  1:   'The Force is strong with you, ' + GUAPO_NAME + '.',
  2:   'Welcome back, ' + GUAPO_NAME + '. Ready for another journey?',
  5:   'Five journeys. The Force grows stronger, ' + GUAPO_NAME + '.',
  10:  'Ten journeys, ' + GUAPO_NAME + '. Master Yoda would be proud.',
  25:  'Twenty-five journeys, ' + GUAPO_NAME + '. A true Jedi Knight.',
  50:  'Fifty journeys. The Force is very strong with you, ' + GUAPO_NAME + '.',
  100: 'One hundred journeys, ' + GUAPO_NAME + '. You have become legend.'
};

function getGreeting() {
  if (specialGreetings[visits]) return specialGreetings[visits];
  /* Time-of-day awareness */
  var hour = new Date().getHours();
  if (hour < 6)  return 'Late night training, ' + GUAPO_NAME + '? The Force never sleeps.';
  if (hour < 12) return 'Good morning, young ' + GUAPO_NAME + '. The Force awakens with you.';
  if (hour < 17) return 'The galaxy awaits you, ' + GUAPO_NAME + '.';
  if (hour < 21) return 'Evening brings wisdom. Welcome, ' + GUAPO_NAME + '.';
  return 'The stars are bright tonight, ' + GUAPO_NAME + '.';
}

var greetEl = document.getElementById('t-greeting');
if (greetEl) greetEl.textContent = getGreeting();

/* ============================================================
   YODA QUOTES — rotating, never repeat in same session
   ============================================================ */
var YODA_QUOTES = [
  'Waiting, are you? Choose, you must.',
  'The destination matters not. The journey does.',
  'Patience you must have, young ' + GUAPO_NAME + '.',
  'Feel the Force. It will guide you.',
  'Much to learn, you still have.',
  'Your path, only you can choose.',
  'Strong with the Force, you are.',
  'In the stars, your destiny lives.'
];
var usedQuotes = [];
function getYodaQuote() {
  if (usedQuotes.length >= YODA_QUOTES.length) usedQuotes = [];
  var available = YODA_QUOTES.filter(function(q) { return usedQuotes.indexOf(q) === -1; });
  var q = available[Math.floor(Math.random() * available.length)];
  usedQuotes.push(q);
  return q;
}

/* ============================================================
   PLANET DATA
   ============================================================ */
var PD = {
  tatooine: {
    img:'./tatooine.PNG', label:'TAKE THE QUIZ',
    planet:'TATOOINE', sub:'Which character are you?',
    color:'#FFB055', glowColor:'rgba(255,150,40,0.55)',
    g1:'rgba(255,150,40,1)', g2:'rgba(200,80,0,0.5)',
    shadow:'rgba(255,140,30,0.6)', retColor:'rgba(255,180,80,0.9)',
    glowDur:'2.4s',
    rotDur:'80s', rotDir:'1',   /* slow clockwise */
    conColor:'rgba(255,150,40,',
    href:'quiz.html', main:true,
    bladeColor:'#FF9933'
  },
  coruscant: {
    img:'./coruscant.PNG', label:'FORCE MAP',
    planet:'CORUSCANT', sub:'Your galaxy',
    color:'#44CCFF', glowColor:'rgba(0,180,255,0.45)',
    g1:'rgba(0,190,255,1)', g2:'rgba(0,100,220,0.5)',
    shadow:'rgba(0,180,255,0.6)', retColor:'rgba(80,210,255,0.9)',
    glowDur:'4.0s',
    rotDur:'120s', rotDir:'-1',  /* slow counter-clockwise */
    conColor:'rgba(0,180,255,',
    href:'#', main:false,
    bladeColor:'#44CCFF'
  },
  dagobah: {
    img:'./dagobah.PNG', label:'TRANSMISSIONS',
    planet:'DAGOBAH', sub:'Messages from Dad',
    color:'#44EE88', glowColor:'rgba(0,200,100,0.45)',
    g1:'rgba(0,210,110,1)', g2:'rgba(0,130,60,0.5)',
    shadow:'rgba(0,200,100,0.6)', retColor:'rgba(80,240,140,0.9)',
    glowDur:'3.8s',
    rotDur:'95s', rotDir:'1',
    conColor:'rgba(0,200,100,',
    href:'#', main:false,
    bladeColor:'#44EE88'
  },
  hoth: {
    img:'./hoth.PNG', label:'ARCHIVE',

    coruscant: { cx: vw * 0.22, cy: topGap + (vh - topGap) * 0.22, sz: secSz  },
    dagobah:   { cx: vw * 0.78, cy: topGap + (vh - topGap) * 0.18, sz: secSz  },

    e.glow.style.height = gSz + 'px';
    e.ret.style.width   = (sz * 0.9) + 'px';
    e.ret.style.height  = (sz * 0.9) + 'px';
    e.ret.style.marginLeft = (-(sz * 0.9)/2) + 'px';
    e.ret.style.marginTop  = (-(sz * 0.9)/2) + 'px';

    e.ring.style.height = rSz + 'px';
    e.ring.style.marginLeft = (-rSz/2) + 'px';
    e.ring.style.marginTop  = (-rSz/2) + 'px';
    e.label.style.top = (sz * 0.56) + 'px';

    var sF = Math.max(6, Math.min(9,  sz * 0.10));

/* ============================================================
   CONSTELLATION LINES
   ============================================================ */
var constellationCanvas = document.getElementById('constellation-canvas');
var conCtx = constellationCanvas.getContext('2d');

/* Connection pairs */
var CONNECTIONS = [
  ['tatooine', 'coruscant'],
  ['tatooine', 'dagobah'],
  ['tatooine', 'hoth'],
  ['coruscant', 'dagobah']
];

function drawConstellations(highlightKey, baseOpacity) {
  var cnv = constellationCanvas;
  conCtx.clearRect(0, 0, cnv.width, cnv.height);
  if (Object.keys(planetPositions).length < 4) return;

  CONNECTIONS.forEach(function(pair) {
    var a = planetPositions[pair[0]];
    var b = planetPositions[pair[1]];
    if (!a || !b) return;

    var isHighlighted = (highlightKey === pair[0] || highlightKey === pair[1]);
    var opacity = isHighlighted ? 0.55 : baseOpacity;
    var lineColor = isHighlighted
      ? PD[highlightKey].conColor + opacity + ')'
      : 'rgba(180,200,255,' + opacity + ')';

    /* Dotted line from edge of one planet to edge of other */
    var dx = b.x - a.x, dy = b.y - a.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var nx = dx/dist, ny = dy/dist;
    var startX = a.x + nx * (a.r + 6);
    var startY = a.y + ny * (a.r + 6);
    var endX   = b.x - nx * (b.r + 6);
    var endY   = b.y - ny * (b.r + 6);

    conCtx.save();
    conCtx.setLineDash([3, 8]);
    conCtx.strokeStyle = lineColor;
    conCtx.lineWidth = isHighlighted ? 1.2 : 0.7;
    conCtx.shadowBlur = isHighlighted ? 6 : 0;
    conCtx.shadowColor = lineColor;
    conCtx.beginPath();
    conCtx.moveTo(startX, startY);
    conCtx.lineTo(endX, endY);
    conCtx.stroke();
    conCtx.restore();
  });
}

/* Animate constellation lines subtly pulsing */
var conPulse = 0;
function animateConstellations() {
  conPulse += 0.012;
  var base = 0.12 + Math.sin(conPulse) * 0.05;
  drawConstellations(lockedKey, base);
  requestAnimationFrame(animateConstellations);
}

var shipLayer = document.getElementById('ship-layer');
var shipQueue = [];

function spawnShip() {
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var types = ['xwing','falcon','destroyer','xwing','xwing']; /* xwing most common */
  var type = types[Math.floor(Math.random()*types.length)];
  var goRight = Math.random() > 0.5;

  var ship = document.createElement('div');
  ship.className = 'ship';
  ship.innerHTML = SHIP_SVGS[type];

  /* Random vertical position — upper 65% of screen */
  var topPct = 5 + Math.random() * 55;
  var startX = goRight ? -100 : (vw + 100);
  var endX   = goRight ? (vw + 100) : -100;
  var duration = 6000 + Math.random() * 8000; /* 6-14 seconds */
  var yWobble = (Math.random() - 0.5) * 30;

  ship.style.cssText =
    'position:absolute;top:' + topPct + '%;left:0;opacity:0;' +
    'transform:translateX(' + startX + 'px) scaleX(' + (goRight ? 1 : -1) + ')';

  if (type === 'destroyer') ship.style.opacity = '0.35';
  shipLayer.appendChild(ship);

  var start = null;
  function animShip(ts) {
    if (!start) start = ts;
    var el = ts - start;
    var t  = Math.min(el / duration, 1);
    /* ease in-out */
    var e  = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    var x  = startX + (endX - startX) * e;
    var y  = Math.sin(t * Math.PI) * yWobble;
    /* Fade in/out at edges */
    var op = Math.min(t * 8, 1, (1 - t) * 8) * 0.7;
    ship.style.opacity = op.toFixed(3);
    ship.style.transform = 'translateX(' + x.toFixed(1) + 'px) translateY(' + y.toFixed(1) + 'px) scaleX(' + (goRight ? 1 : -1) + ')';
    if (t < 1) {
      requestAnimationFrame(animShip);
    } else {
      if (ship.parentNode) ship.parentNode.removeChild(ship);
    }
  }
  requestAnimationFrame(animShip);

  /* Schedule next ship — 20-45 seconds */
  setTimeout(spawnShip, 20000 + Math.random() * 25000);
}

var tieCursor = document.getElementById('tie-cursor');
var cursorX = 0, cursorY = 0, lastCursorX = 0, lastCursorY = 0;
var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

if (!isMobile) {
  tieCursor.style.display = 'block';
  document.addEventListener('mousemove', function(e) {
    cursorX = e.clientX;
    cursorY = e.clientY;
  });
  function animCursor() {
    /* Smooth follow */
    lastCursorX += (cursorX - lastCursorX) * 0.15;
    lastCursorY += (cursorY - lastCursorY) * 0.15;
    var dx = cursorX - lastCursorX;
    var dy = cursorY - lastCursorY;
    /* Bank based on horizontal movement */
    var bank = Math.max(-25, Math.min(25, dx * 3));
    tieCursor.style.left = lastCursorX + 'px';
    tieCursor.style.top  = lastCursorY + 'px';
    tieCursor.style.transform = 'translate(-50%,-50%) rotate(' + bank + 'deg)';
    requestAnimationFrame(animCursor);
  }
  animCursor();
}

/* ============================================================
   FINGER TRAIL (mobile)
   ============================================================ */
if (isMobile) {
  var trailDots = [];
  var TRAIL_LENGTH = 8;
  for (var ti = 0; ti < TRAIL_LENGTH; ti++) {
    var dot = document.createElement('div');
    dot.className = 'trail-dot';
    var dotSize = (TRAIL_LENGTH - ti) * 1.5 + 2;
    dot.style.cssText =
      'width:' + dotSize + 'px;height:' + dotSize + 'px;' +
      'opacity:0;pointer-events:none;' +
      'z-index:999;border-radius:50%;' +
      'background:rgba(0,200,255,' + (0.6 * (TRAIL_LENGTH - ti) / TRAIL_LENGTH) + ');' +
      'box-shadow:0 0 ' + (dotSize*1.5) + 'px rgba(0,200,255,0.6);';
    document.body.appendChild(dot);
    trailDots.push({ el: dot, x: 0, y: 0 });
  }

  var touchX = 0, touchY = 0, touching = false;

  document.addEventListener('touchmove', function(e) {
    var touch = e.touches[0];
    touchX = touch.clientX;
    touchY = touch.clientY;
    touching = true;
  }, { passive: true });
  document.addEventListener('touchend', function() {
    touching = false;
    trailDots.forEach(function(d) { d.el.style.opacity = '0'; });
  });
  document.addEventListener('touchstart', function(e) {
    var touch = e.touches[0];
    touchX = touch.clientX;
    touchY = touch.clientY;
    touching = true;
  }, { passive: true });

  function animTrail() {
    if (touching) {
      /* Shift trail */
      for (var i = TRAIL_LENGTH - 1; i > 0; i--) {
        trailDots[i].x = trailDots[i-1].x;
        trailDots[i].y = trailDots[i-1].y;
      }
      trailDots[0].x = touchX;
      trailDots[0].y = touchY;
      trailDots.forEach(function(d, idx) {
        d.el.style.left = d.x + 'px';
        d.el.style.top  = d.y + 'px';
        d.el.style.opacity = ((TRAIL_LENGTH - idx) / TRAIL_LENGTH * 0.8).toFixed(2);
      });
    }
    requestAnimationFrame(animTrail);
  }
  animTrail();
}

/* ============================================================
   GYROSCOPE PARALLAX
   ============================================================ */
var gyroX=0, gyroY=0, gyroTX=0, gyroTY=0;

function initGyro() {
  if (!window.DeviceOrientationEvent) return;
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.addEventListener('click', function askGyro() {
      DeviceOrientationEvent.requestPermission().then(function(state) {
        if (state === 'granted') listenGyro();
      }).catch(function(){});
      document.removeEventListener('click', askGyro);
    }, { once: true });
  } else {
    listenGyro();
  }
}

function listenGyro() {
  window.addEventListener('deviceorientation', function(e) {
    gyroTX = Math.max(-15, Math.min(15, (e.gamma||0) * 0.4));
    gyroTY = Math.max(-10, Math.min(10, (e.beta||0)  * 0.25));
  });
}

function gyroTick() {
  gyroX += (gyroTX - gyroX) * 0.06;
  gyroY += (gyroTY - gyroY) * 0.06;
  if (Math.abs(gyroX) > 0.05 || Math.abs(gyroY) > 0.05) {
    document.getElementById('stars-far').style.transform    = 'translate('+(gyroX*0.8).toFixed(2)+'px,'+(gyroY*0.8).toFixed(2)+'px)';
    document.getElementById('stars-near').style.transform   = 'translate('+(gyroX*2.2).toFixed(2)+'px,'+(gyroY*2.2).toFixed(2)+'px)';
    document.getElementById('nebula-layer').style.transform = 'translate('+(gyroX*0.4).toFixed(2)+'px,'+(gyroY*0.4).toFixed(2)+'px)';
    document.getElementById('planet-layer').style.transform = 'translate('+(gyroX*1.5).toFixed(2)+'px,'+(gyroY*1.5).toFixed(2)+'px)';
  }
  requestAnimationFrame(gyroTick);
}

var lsCtx    = lsCanvas.getContext('2d');
var lsRaf    = null;

function assembleButton() {
  var btn = document.getElementById('ls-btn');
  /* Slight delay then assemble */
  setTimeout(function() {
    /* Recalculate perimeter */
    var bw = btn.offsetWidth, bh = btn.offsetHeight;
    var rect = document.getElementById('btn-border-rect');
    rect.setAttribute('width', bw);
    rect.setAttribute('height', bh);
    var perimeter = 2 * (bw + bh);
    rect.style.setProperty('--perimeter', perimeter);
    rect.setAttribute('stroke-dasharray', perimeter);
    rect.setAttribute('stroke-dashoffset', perimeter);
    /* Force reflow */
    btn.classList.remove('assembled');
    void btn.offsetWidth;
    btn.classList.add('assembled');
  }, 300);
}

document.getElementById('ls-btn').addEventListener('click', closeLS);

function launchLS(key) {
  var d = PD[key]; lsDest = key;
  document.getElementById('ls').classList.add('on');
  lsCanvas.width = window.innerWidth; lsCanvas.height = window.innerHeight;

  var pimg = document.getElementById('ls-pimg');
  pimg.src = d.img;
  pimg.style.setProperty('--pg1', d.g1);
  pimg.style.setProperty('--pg2', d.g2);
  document.getElementById('ls-pname').textContent = d.planet;
  document.getElementById('ls-pname').style.color = d.color;
  document.getElementById('ls-title').textContent = d.label;
  document.getElementById('ls-title').style.color = d.color;
  document.getElementById('ls-sub').textContent = d.sub;

  /* Color-tinted lightspeed flash */
  var flashR=255, flashG=255, flashB=255;
  if (key==='tatooine')  { flashR=255; flashG=180; flashB=80; }
  if (key==='coruscant') { flashR=80;  flashG=180; flashB=255; }
  if (key==='dagobah')   { flashR=80;  flashG=255; flashB=140; }
  if (key==='hoth')      { flashR=180; flashG=220; flashB=255; }

  var cx=lsCanvas.width/2, cy=lsCanvas.height/2;
  var stars=[];
  for (var i=0;i<260;i++) {
    var angle=Math.random()*Math.PI*2, dist=10+Math.random()*Math.min(cx,cy)*0.92;
    stars.push({angle:angle,dist:dist,spd:0.3+Math.random()*2.6,sz:0.4+Math.random()*1.6,br:145+Math.floor(Math.random()*110)});
  }

  var t0=null,STRE=1100,FLASH=300,phase=1;
  function frame(ts) {
    if (!t0) t0=ts; var el=ts-t0;
    lsCtx.clearRect(0,0,lsCanvas.width,lsCanvas.height);
    lsCtx.fillStyle='#000008'; lsCtx.fillRect(0,0,lsCanvas.width,lsCanvas.height);

    if (phase===1) {
      var t=Math.min(el/STRE,1),e=t*t*(3-2*t);
      stars.forEach(function(st) {
        var stretch=1+e*28*st.spd, dn=st.dist*(1+e*6);
        var sx=cx+Math.cos(st.angle)*dn, sy=cy+Math.sin(st.angle)*dn;
        var ex=cx+Math.cos(st.angle)*(dn+stretch*10), ey=cy+Math.sin(st.angle)*(dn+stretch*10);
        lsCtx.beginPath(); lsCtx.moveTo(sx,sy); lsCtx.lineTo(ex,ey);
        var b=st.br;
        lsCtx.strokeStyle='rgba('+b+','+b+','+Math.min(255,b+50)+','+(0.28+e*0.72)+')';
        lsCtx.lineWidth=st.sz*(1+e*3); lsCtx.stroke();
      });
      var g=lsCtx.createRadialGradient(cx,cy,0,cx,cy,140*e);
      /* Tinted core glow */
      g.addColorStop(0,'rgba('+flashR+','+flashG+','+flashB+','+(e*0.55)+')');
      g.addColorStop(1,'transparent');
      lsCtx.fillStyle=g; lsCtx.fillRect(0,0,lsCanvas.width,lsCanvas.height);
      if (el>=STRE){phase=2;t0=ts;}
      lsRaf=requestAnimationFrame(frame);

    } else if (phase===2) {
      var tf=el/FLASH, op=tf<0.4?tf/0.4:1-((tf-0.4)/0.6);
      op=Math.max(0,Math.min(1,op));
      /* Tinted flash */
      lsCtx.fillStyle='rgba('+flashR+','+flashG+','+flashB+','+op+')';
      lsCtx.fillRect(0,0,lsCanvas.width,lsCanvas.height);
      if (el>=FLASH) {
        document.getElementById('ls-dest').classList.add('show');
        assembleButton();
        return;
      }
      lsRaf=requestAnimationFrame(frame);
    }
  }
  lsRaf=requestAnimationFrame(frame);
}

function closeLS() {
  document.getElementById('ls-dest').classList.remove('show');
  document.getElementById('ls-btn').classList.remove('assembled');
  setTimeout(function() {
    document.getElementById('ls').classList.remove('on');
    if (lsRaf){cancelAnimationFrame(lsRaf);lsRaf=null;}
    lsCtx.clearRect(0,0,lsCanvas.width,lsCanvas.height);
    Object.keys(pels).forEach(function(k) {
      pels[k].wrap.style.opacity='1';
      pels[k].wrap.classList.remove('locked');
    });
    lockedKey=null;
    document.getElementById('info-card').classList.remove('visible');
  },400);
  if (lsDest && PD[lsDest].href !== '#') {
    setTimeout(function() {
      fadeTransition(function() { window.location.href = PD[lsDest].href; });
    }, 300);
  }
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  buildStars();
  buildNebulae();
  layout();
  floatTick();
  enterPlanets();
  initGyro();
  gyroTick();
  startYodaTimer();
  animateConstellations();
  /* First ship appears after 8 seconds */
  setTimeout(spawnShip, 8000);
}

window.addEventListener('load', init);
window.addEventListener('resize', function() {
  layout();
});

</script>
