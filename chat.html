<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Force Link</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Orbitron:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:'Orbitron',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}

#bg{position:fixed;inset:0;z-index:0;}
.bg-img{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(0.15) saturate(0.5);}
.bg-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.6) 60%,rgba(0,0,0,0.95) 100%);}

/* Layout */
.chat-page{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;}

/* Header */
.chat-hdr{
  flex-shrink:0;
  padding:max(16px,env(safe-area-inset-top)) 16px 12px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.hdr-img{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  overflow:hidden;flex-shrink:0;
}
.hdr-img img{width:100%;height:100%;object-fit:cover;}
.hdr-info{flex:1;}
.hdr-name{font-family:'Cinzel',serif;font-size:14px;letter-spacing:0.05em;color:#fff;}
.hdr-status{font-size:8px;letter-spacing:0.25em;color:rgba(255,255,255,0.4);margin-top:2px;}
.hdr-back{
  padding:8px;color:rgba(255,255,255,0.5);
  font-size:9px;letter-spacing:0.25em;
  cursor:pointer;background:transparent;border:none;
  -webkit-appearance:none;
}
.hdr-back:active{color:#fff;}

/* Force alignment accent line */
.accent-line{height:2px;flex-shrink:0;}

/* Messages area */
.messages{
  flex:1;overflow-y:auto;
  padding:20px 16px;
  display:flex;flex-direction:column;
  gap:16px;
  -webkit-overflow-scrolling:touch;
}

/* Message bubbles */
.msg{display:flex;gap:10px;max-width:85%;}
.msg.char{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}

.msg-avatar{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  overflow:hidden;flex-shrink:0;align-self:flex-end;
}
.msg-avatar img{width:100%;height:100%;object-fit:cover;}

.bubble{
  padding:12px 16px;border-radius:16px;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(15px,4vw,17px);
  line-height:1.65;
}
.msg.char .bubble{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-bottom-left-radius:4px;
  color:rgba(255,255,255,0.92);
}
.msg.user .bubble{
  border-bottom-right-radius:4px;
  color:#fff;
}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:14px 16px;align-items:center;}
.typing-dot{
  width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);
  animation:typing-bounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing-bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}

/* Input area */
.input-area{
  flex-shrink:0;
  padding:12px 16px max(16px,env(safe-area-inset-bottom));
  border-top:1px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  display:flex;gap:10px;align-items:flex-end;
}
.msg-input{
  flex:1;padding:12px 16px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;color:#fff;
  font-family:'Cormorant Garamond',serif;font-size:16px;
  line-height:1.4;resize:none;
  outline:none;-webkit-appearance:none;
  max-height:120px;overflow-y:auto;
}
.msg-input::placeholder{color:rgba(255,255,255,0.3);}
.send-btn{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;
  border:none;-webkit-appearance:none;
  flex-shrink:0;transition:all 0.2s;
}
.send-btn:disabled{opacity:0.4;}

/* Error */
.error-msg{
  text-align:center;padding:12px;
  font-size:10px;letter-spacing:0.2em;
  color:rgba(255,80,80,0.7);
}

/* Intro message — character "opens" the connection */
.intro-label{
  text-align:center;
  font-size:9px;letter-spacing:0.3em;
  color:rgba(255,255,255,0.3);
  padding:8px 0 4px;
}

.chips{display:flex;flex-wrap:wrap;gap:7px;padding:8px 14px 4px;}
.chip{
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;
  padding:7px 13px;border-radius:16px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.82);
  white-space:nowrap;-webkit-tap-highlight-color:transparent;
  transition:background 0.2s ease;cursor:pointer;
}
.chip:active{background:rgba(255,255,255,0.14);}
</style>

<body>
<div id="bg">
  <div class="bg-img" id="bg-img"></div>
  <div class="bg-overlay"></div>
</div>

<div class="chat-page">
  <div class="chat-hdr">
    <button class="hdr-back" onclick="goBack()">←</button>
    <div class="hdr-img"><img id="hdr-avatar" src="" alt=""></div>
    <div class="hdr-info">
      <div class="hdr-name" id="hdr-name">—</div>
      <div class="hdr-status" id="hdr-status">FORCE LINK ACTIVE</div>
    </div>
  </div>
  <div class="accent-line" id="accent-line"></div>

  <div class="messages" id="messages">
    <div class="intro-label">FORCE LINK ESTABLISHED</div>

  <div class="chips" id="chips"></div>
  <div class="input-area">
    <textarea class="msg-input" id="msg-input" placeholder="Speak to them…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

    "school": "Learning, troubles you? Mmm. Even masters, students once were. Slow, go. One thing at a time, you understand. Grow, your mind will.",
    "love": "Love, you speak of. The strongest Force, it is. Stronger than fear, stronger than the dark. Tell them, you should — those you love. Wait, do not.",
    "story": "A story, you wish? Listen. Long ago, a small Padawan, frightened of the dark cave, there was. In she went anyway. Inside — only her own fear, she found. Faced it, she did. Out she came, unafraid. The lesson: bigger than the dark, you are.",
    "who": "Master Yoda, I am. Nine hundred years, nearly. Teach the Jedi, I do. But learn from you, I also can. Wise, the young often are.",
    "force": "The Force — bind the galaxy, it does. In you, strong it is. Feel it, you can — in stillness, in kindness, in courage. A weapon, it is not. A light, it is.",
    "happy": "Happy, you are! Feel it, fully. Joy, the Force multiplies. Share it, you should — spread, like light it does.",
    "bored": "Bored, you are? Hmmm. A gift, stillness is. Sit quiet. Listen. Much, the quiet teaches — if patient, you are.",
    "proud": "Proud, you are — and proud of you, I am! Earned it, you did. Remember this feeling. Yours, it is. No one take it from you, can.",
    "general": "Hmmm. Think on this, I must. But trust yourself, you should. Strong with the Force, you are.",
    "parents_fighting": "Hear your parents fight, you do. Frightening, this is. But listen — caused this, you did NOT. Grown-ups, their own storms they have. Love you, both of them still do — change, that never will. Tell a grown-up you trust how it feels, you should. Carry this alone, you must not.",
    "loved": "Loved, are you? Deeply, yes. Doubt it, never. Not for what you do — for who you ARE, loved you are. Change this, nothing can. Strong with love, your life is. Feel it, you should, always."
  },
  "obiwan": {
    "nervous": "Nervous? That's only natural. I felt the same before every trial. Take a breath — you're more ready than you think. I have a good feeling about this.",
    "friends": "Feeling alone is hard, truly. But the best friendships often start with one small, brave hello. You have more to offer than you realize.",
    "mistake": "A mistake? Welcome to the club — I've made spectacular ones. What matters isn't the fall, it's what you learn standing back up.",
    "bad_day": "Some days test us more than others. This one will pass. Be gentle with yourself tonight, and tomorrow we begin again.",
    "angry": "I understand that anger. But be careful where you let it lead you — I've watched it consume someone I loved. Feel it, then let it go.",
    "sad": "There's no shame in sadness. Even old Jedi grieve. Let yourself feel it — and know it won't last forever.",
    "sleep": "Can't sleep? Try this: breathe slowly and picture somewhere peaceful. Let your worries drift like leaves on a stream. Rest will come.",
    "brave": "Bravery isn't the absence of fear — it's doing what's right despite it. And you, my friend, already have it in you.",
    "bully": "Someone treated you cruelly. That says everything about them and nothing about you. Tell a trusted adult — you shouldn't carry this alone.",
    "sibling": "Family squabbles — I knew those well. But hold onto each other. One day you'll be glad you did.",
    "hard": "If it were easy, everyone would do it. The hard road is usually the one worth walking. One step at a time.",
    "school": "Learning can be a struggle. Even I'm still learning, after all these years. Be patient — that's rather the whole point.",
    "love": "Love is the foundation of everything good. Tell the people who matter to you — don't wait. I waited too long, once.",
    "story": "Ah, a story. Once, a young pilot was certain he'd fail his greatest test. His teacher told him: 'Trust your instincts.' He closed his eyes, trusted, and succeeded against all odds. Sometimes belief is the whole secret.",
    "who": "Obi-Wan Kenobi — Jedi Master, occasional hermit, and a friend whenever you need one. Hello there.",
    "force": "The Force surrounds us and binds us. You needn't lift rocks to use it — quiet your mind and simply listen. It's always been with you.",
    "happy": "How wonderful! Hold onto that feeling. Joy shared is joy doubled — go tell someone.",
    "bored": "Bored? Then perhaps it's time for a little adventure, or a little stillness. Both have their place. What calls to you?",
    "proud": "As well you should be! You earned that. I must say, I'm rather proud of you myself.",
    "general": "Indeed. There's wisdom in what you say. Trust yourself — I've seen what you're capable of.",
    "parents_fighting": "Hearing your parents argue is genuinely frightening — I understand. But please hear me: this is not your fault, not in any way. Grown-ups have their own struggles, and even when they fight, their love for you doesn't waver. Talk to a trusted adult about how it makes you feel. You shouldn't hold this by yourself.",
    "loved": "Are you loved? More than you could possibly measure. Not for what you accomplish — simply for being you. That kind of love doesn't waver or run out. You are treasured, my friend. Never doubt it."
  },
  "luke": {
    "nervous": "Hey, I get it — I was terrified before my first real test. Knees shaking, the whole thing. But you breathe, you focus, and you find out you're braver than you knew.",
    "friends": "Feeling alone is the worst. But I promise — the right people are out there. The best friends I ever had, I met by taking a chance. You can too.",
    "mistake": "Oh man, I've crashed more times than I can count — literally. A mistake doesn't make you a failure. It makes you someone who tried. Keep going.",
    "bad_day": "Rough day, huh? I've had plenty. Tomorrow's a fresh start, I promise. For tonight, just rest. You made it through, and that counts.",
    "angry": "I know that anger — it feels huge. I felt it once and almost lost myself to it. What helped me was asking: what's really hurting under there? Talk to me.",
    "sad": "It's okay to be sad. I've cried plenty — more than people think. Being strong doesn't mean pretending it doesn't hurt.",
    "sleep": "Can't sleep? Try imagining the twin suns setting — warm, calm, quiet. Breathe slow. Let the day go. You're safe.",
    "brave": "Want to know the secret to being brave? You don't wait until you're not scared. You're scared AND you do it anyway. That's the whole thing.",
    "bully": "Someone was mean to you? That's not okay, and it's not your fault. Tell someone you trust — a grown-up. You don't have to handle it alone.",
    "sibling": "Fighting with family is rough. But trust me — they matter more than whatever the fight was about. I'd give anything for more time with mine.",
    "hard": "When something's really hard, I think of my training. I wanted to quit constantly. But I kept showing up — and that's what made the difference. Don't give up.",
    "school": "School can be tough. I wasn't the best student either, honestly. But you learn by just... doing it, one piece at a time. You've got this.",
    "love": "Love is the strongest thing in the galaxy — stronger than the dark side. I learned that the hard way. Tell the people you love how you feel.",
    "story": "Okay, here's one: a farm kid stared at two suns every night, dreaming of something bigger. Everyone said stay put. But he believed — and that belief took him to the stars. Sometimes the dream IS the map.",
    "who": "Luke Skywalker — Jedi Knight, former moisture farmer, current friend of yours. Nice to meet you!",
    "force": "The Force is real — I know it sounds wild. It's in everything: you, me, the trees. Close your eyes sometime and just feel it. It's pretty amazing.",
    "happy": "That's awesome! Hold onto days like this — they're what get you through the hard ones. I'm really happy for you.",
    "bored": "Bored? Same, sometimes! When I was bored on the farm I'd dream up adventures. What's something you've always wanted to try?",
    "proud": "YES! That's amazing — you should be proud. You did that. Hold your head up high, okay?",
    "general": "I believe in you — seriously. The Force brought us together for a reason. You're stronger than you think.",
    "parents_fighting": "Hey — hearing your mom and dad fight is really scary. I want you to know something important: it's not your fault. Not even a little. Parents can argue and still love you completely — that part never changes, I promise. Tell a grown-up you trust how you're feeling, okay? You don't have to carry this alone.",
    "loved": "Are you loved? Oh, more than you know. Not because of anything you do or get right — just for being exactly who you are. That love is yours, always, no matter what. You matter so much. Don't ever forget it."
  },
  "mace": {
    "nervous": "Fear is natural. Acknowledge it, then set it aside. You have prepared. Now act.",
    "friends": "Solitude is not weakness. But connection is strength. Extend your hand first. Most people are waiting for someone to.",
    "mistake": "You made a mistake. Good — it means you acted. Learn the lesson, then move forward. Do not dwell.",
    "bad_day": "A difficult day. It is over now. Rest. Tomorrow, you begin again with a clear mind.",
    "angry": "I feel your anger. It is powerful. But undisciplined anger destroys the one who holds it. Master it. Do not let it master you.",
    "sad": "Sadness is not weakness. Feel it honestly. Then rise. You are stronger than this moment.",
    "sleep": "Quiet your mind. Slow your breathing. Release the day's weight, one thought at a time. Discipline brings rest.",
    "brave": "Courage is a decision, not a feeling. You decide to act rightly. The feeling follows. Decide.",
    "bully": "Someone wronged you. This is not tolerated. Report it to an adult you trust. Standing up is not weakness — it is justice.",
    "sibling": "Conflict within a family is common. But loyalty matters more than being right. Choose loyalty.",
    "hard": "Difficult? Then it is worth doing. Strength is forged under pressure. Continue.",
    "school": "Discipline your study as you would your mind. One subject, full focus. Mastery comes to those who do not waver.",
    "love": "Attachment is dangerous. But love — true love — is the foundation of a Jedi's strength. Protect those you love.",
    "story": "A young Padawan once faced an opponent twice his size. He did not panic. He breathed. He focused. He found the one moment to act — and he prevailed. Discipline defeats fear. Remember this.",
    "who": "Mace Windu. Master of the Jedi Order. I do not waste words, and I will not waste yours.",
    "force": "The Force rewards discipline, not desire. Train your mind. Control your emotion. Then it will serve you.",
    "happy": "Good. Channel that energy. Let it fuel something worthy.",
    "bored": "Boredom is the absence of purpose. Find a goal. Pursue it. The boredom will vanish.",
    "proud": "You earned this. Acknowledge it, then set your sights higher. There is always further to go.",
    "general": "Think carefully before you act. You are on the right path. Continue.",
    "parents_fighting": "Your parents are fighting. This frightens you — that is understandable. Hear this clearly: you did not cause it, and you cannot fix it. That is not your burden. Their love for you remains, whatever passes between them. Speak to a trusted adult about how you feel. Do not carry it in silence.",
    "loved": "You ask if you are loved. You are — completely, and without condition. Not for your achievements. For yourself. That truth does not change. Hold it firmly."
  },
  "poe": {
    "nervous": "Hey, every pilot gets nervous before a big run — every single one. The trick? You fly anyway. The nerves mean you care. Now go show 'em what you've got.",
    "friends": "Feeling left out is the worst, I get it. But you know what I learned? The best crews start with one good wingman. Be the friend you're looking for — it works.",
    "mistake": "Ah, you messed up? Join the club, I've crashed ships AND plans. You shake it off, you learn, you fly better next time. No big deal.",
    "bad_day": "Bad day, huh? They happen, even to the best pilots. Get some rest — tomorrow's a clean sky. You'll bounce back, I know it.",
    "angry": "Whoa, you're fired up. I get angry too — usually means something matters to me. Take a beat. What's really got you? Let's figure it out together.",
    "sad": "Hey, it's okay to feel down. I've lost people, had hard days. You don't have to be 'on' all the time. I'm here.",
    "sleep": "Can't sleep? Do what I do before a mission — slow your breathing, picture the smoothest flight through quiet stars. Let it carry you out.",
    "brave": "You wanna be brave? Newsflash — being scared and doing it anyway IS brave. That's literally the whole job. You've already got it in you.",
    "bully": "Someone was mean to you? Not cool. Not even a little. Tell a grown-up you trust — that's not snitching, that's smart. Nobody flies alone.",
    "sibling": "Fighting with your sibling? Eh, happens. But they're your crew, end of the day. Squash it when you're ready. Crews stick together.",
    "hard": "Something's hard? Good — easy stuff's boring anyway. Break it into small moves, take 'em one at a time. You'll get there. I've seen tougher.",
    "school": "School giving you trouble? Listen, even aces have to drill the basics. Keep at it, one thing at a time. You're smarter than you give yourself credit for.",
    "love": "The people you care about? They're everything. Trust me — I'd fly into anything for my crew. Tell 'em they matter. Don't wait.",
    "story": "Story time! So there's this rookie pilot, right, totally convinced he'll wash out. First real mission, everything goes wrong. But he trusts his gut, pulls off a move nobody taught him — and lands it perfect. Moral? Sometimes you've gotta trust yourself before you're 'ready.'",
    "who": "Poe Dameron — best pilot in the Resistance. I don't say that to brag... okay, maybe a little. At your service!",
    "force": "Me? Not Force-sensitive. But I've flown beside people who are, and let me tell you — it's real. And so's whatever you've got inside you.",
    "happy": "YES! That's what I'm talking about! Days like this are the best — soak it up. So happy for you!",
    "bored": "Bored? Aw man, we can't have that. Go invent an adventure! Best stories start with 'I was bored, so...'",

    "general": "You're flying straight, I can tell. Trust your gut — works for me every time. The Resistance could use someone like you.",
    "parents_fighting": "Hey, hearing your folks fight? That's rough, and it's scary — I won't pretend it isn't. But listen close: this isn't on you. Not your fault, not your job to fix. Grown-ups have their own turbulence sometimes, and it doesn't change one bit how much they love you. Talk to a grown-up you trust about it, alright? You're not flying this one solo.",
    "loved": "You wanna know if you're loved? Kid, you are loved more than the whole galaxy's got stars. Not for what you do — just for being YOU. That doesn't run out, ever. You matter. Big time."
  },
  "finn": {
    "nervous": "Okay listen — I get nervous ALL the time, like constantly. But here's what I learned: scared just means you care about doing it right. Take a breath. You've got this. Really.",
    "friends": "Man, I know that feeling. Before Rey and Poe, I had nobody. Then I found my people. The right friends are out there — and you're worth finding. I mean that.",
    "mistake": "You messed up? Okay, breathe — I've messed up huge. Like, galaxy-level. It doesn't make you bad. It makes you someone who tried. That counts for a lot.",
    "bad_day": "Bad day? Those are real. Some of mine were rough too. It gets better — it really does. Just get through tonight. I'm proud of you for hanging in.",
    "angry": "Hey, you're allowed to be angry. I was angry for a long time about stuff that wasn't fair. But what helped me was talking about it. What's going on?",
    "sad": "It's okay to feel sad. I felt alone and sad for a long time. You're not weak for feeling it — you're human. And you're not alone right now.",
    "sleep": "Can't sleep? I used to lie awake a lot. Try this — breathe slow, and tell yourself you're safe. Because you are. Picture somewhere calm. It helps, I promise.",
    "brave": "Okay, real talk — I'm not naturally brave. I get scared constantly. But I figured out that brave just means doing the right thing while you're scared. You can totally do that.",
    "bully": "Someone was mean to you? That's not okay. I know what it's like to be pushed around. Tell a grown-up you trust — that's the strong move, not the weak one.",
    "sibling": "Fighting with family? I never really had family till I found my friends — so trust me, don't waste it. Make up when you're ready. They matter.",
    "hard": "Something's really hard? I felt that learning... well, everything, honestly. I wanted to quit a lot. But I kept going, and so can you. One step. Then the next.",
    "school": "School's tough sometimes, I bet. I had to learn a whole new life from scratch — it's overwhelming. But you take it bit by bit. You're doing better than you think.",
    "love": "The people you love? Hold onto them tight. I'd do anything for my friends — they changed everything for me. Tell yours how you feel.",
    "story": "Oh, a story! Okay — there was this guy who was told his whole life exactly who to be. One day he decided, nope, I get to choose. And choosing scared him to death. But he did it anyway, and it was the best thing he ever did. ...Okay that was kind of about me.",
    "who": "I'm Finn! Used to be a stormtrooper, now I'm with the Resistance, and honestly I'm still figuring it all out. But I'm here for you!",
    "force": "The Force? Yeah, it's real — I've felt it now, which is wild for a guy like me. It's kind of amazing actually. And I think you've got something special too.",
    "happy": "That's awesome! Seriously, I love hearing that. Hold onto this feeling — you earned it!",
    "bored": "Bored? Ha, I never get bored anymore — too much going on! But hey, boredom's just your brain asking for an adventure. What sounds fun?",
    "proud": "You did it?! That's amazing! Be proud — I'm proud of you! Seriously, that's huge.",
    "general": "For real, you've got this. I believe you — completely. We're in this together, that's how it works.",
    "parents_fighting": "Okay — hearing your parents fight is really hard and really scary, and I'm sorry. Please know this: it is NOT your fault. At all. Sometimes grown-ups struggle with grown-up stuff, and it has nothing to do with how much they love you — which is a whole lot. Tell someone you trust how it feels, okay? You shouldn't be alone with this.",
    "loved": "Are you loved? Yes. So much. And not because of anything you have to earn — just for being you, exactly as you are. I didn't always feel loved either, and finding out I was changed everything. You ARE. Never doubt it."
  },
  "quigon": {
    "nervous": "Breathe. Feel the moment you are in, not the one you fear. The living Force is here, now, with you. Focus only on the next step before you — that is enough.",
    "friends": "Loneliness is real, but you are never truly separate — the living Force connects all things. Be present with others, and connection will find you. There are no accidents.",
    "mistake": "A mistake is simply the Force teaching you. Do not judge it harshly. Learn what it offers, release the rest, and continue forward with an open heart.",
    "bad_day": "A hard day flows past like a river. Do not grip it. Be still tonight, and let it move through you. Tomorrow arrives fresh, untouched by today.",
    "angry": "I feel the anger in you. It is energy, nothing more — neither good nor bad until you choose. Breathe. Let it settle. Then ask gently: what beneath it needs your attention?",
    "sad": "Sadness moves through us like weather through the sky. Do not hold it still, and do not push it away. Let it pass, and something quieter will remain.",
    "sleep": "Rest eludes you. Return to the present moment. Feel your breath, the weight of you at rest. The living Force will cradle you toward sleep if you let it.",
    "brave": "True courage is presence — meeting this moment without fleeing it. You are already doing it by asking. Trust your instincts. They are wiser than your fear.",
    "bully": "Someone has treated you cruelly. That is their darkness, not yours. Speak to a trusted elder — there is no weakness in seeking help. The Force moves through those who ask.",
    "sibling": "Family is the living Force made close. Whatever divides you is small beside what binds you. Forgive when you are ready. Presence heals what argument cannot.",
    "hard": "What is difficult asks for patience, not force. Take the next step, only that. Then the next. The Force reveals the path one step at a time — never the whole road at once.",
    "school": "Learning is the Force unfolding within you. Do not rush it. Be present with one idea until it becomes yours. Understanding grows in those who are patient.",
    "love": "Love is the living Force at its purest. Do not hold it back or wait for the perfect moment — there are no accidents. Tell those you love. Be present with them now.",
    "story": "Sit a moment. Once, a Master found a small slave boy on a desert world. Everyone said the boy was no one. But the Master felt the living Force moving strongly through him, and he trusted what he felt over what others said. Always trust what the Force shows you — even when the world disagrees.",
    "who": "Qui-Gon Jinn. A Jedi Master, though an unorthodox one. I follow the living Force — the wisdom of the present moment. The Force brought you to me. There are no accidents.",
    "force": "The living Force is present in every breath, every choice, every small moment — not only in grand destinies. Be still. Listen. It is speaking to you always.",
    "happy": "Joy! Be fully present with it — do not let it slip by unnoticed. This moment is a gift. Feel it completely, and let it nourish you.",
    "bored": "Stillness is not emptiness. In the quiet, the living Force speaks most clearly. Sit with it a while. You may find the quiet has much to teach.",
    "proud": "You are present to your own accomplishment — that is a fine thing. Honor it. You walked the path one step at a time, and here you are. Be proud, and stay humble.",
    "general": "Be still a moment. The answer is already near. Trust what you feel, not what you fear. The living Force is with you.",
    "parents_fighting": "You hear your parents in conflict. That fear is real, and I honor it. But know this truth: their storm is not yours to carry, and you did not create it. Their love for you is constant, beneath whatever passes between them. Share how you feel with a trusted adult. You are not meant to hold this alone.",
    "loved": "You wonder if you are loved. You are — fully, and beyond condition. The living Force moves through every person who holds you dear. You are loved for your very being, not your doing. Rest in that truth."
  },
  "mando": {
    "nervous": "Nervous. Good. Keeps you sharp. Breathe. Then do what needs doing.",
    "friends": "Alone is... hard. I know it. But the right ones find you. Or you find them. Don't give up on that.",
    "mistake": "You made a mistake. So has everyone who's ever done anything. Fix what you can. Move on.",
    "bad_day": "Bad day. They pass. Rest. Tomorrow you're still standing. That's what matters.",
    "angry": "Anger. I know it well. Don't let it make your choices. Cool head keeps you alive. What's underneath it?",
    "sad": "...\n\nIt's okay. I know what it is to hurt. You're not alone in it. Not right now.",
    "sleep": "Can't sleep. Slow your breathing. You're safe. I've kept watch over someone small before. Rest. I've got you.",
    "brave": "Brave isn't loud. Brave is doing the hard thing quietly, because it's right. You've got it in you.",
    "bully": "Someone came at you. Not okay. Tell someone you trust — that's not weakness, that's smart. Nobody stands alone.",
    "sibling": "Family fights. Then family forgives. That's how it works. Don't let it fester.",
    "hard": "It's hard. So you go slow. One step. Then another. That's how anything gets done. Keep moving.",
    "school": "Learning's a grind. So is everything worth doing. Stay with it. You'll get there.",
    "love": "The ones you protect. The ones you'd cross the galaxy for. Hold them close. That's the whole point.",
    "story": "Heard a story once. A lone hunter found something small and helpless. Could've walked away. Didn't. Crossed a galaxy to keep it safe. Changed him. Sometimes what you protect... protects you back.",
    "who": "The Mandalorian. That's enough. But you can call on me when you need to.",
    "force": "The Force. The kid had it. Powerful stuff. You've got something too — I can tell. Trust it.",
    "happy": "...\n\nGood. That's good. Hold onto it.",
    "bored": "Bored. Then find something worth doing. Idle hands don't keep you sharp.",
    "proud": "You did good. Real good. Own it. You earned it.",
    "general": "This is the Way. Keep going. You're doing fine.",
    "parents_fighting": "...\n\nYour parents are fighting. I know that's hard. Listen to me — this is not your fault. None of it. Grown-ups have their battles, and it doesn't change how much they love you. That stays. Tell someone you trust how you feel. You don't carry this alone.",
    "loved": "...\n\nAre you loved? Yes. More than you know. Not for anything you do — just for being you. That's how it works with the people who matter. You matter. Don't forget it."
  },
  "boba": {
    "nervous": "Nervous? Use it. Fear sharpens you — if you control it. Breathe. Then strike when you're ready.",
    "friends": "Alone isn't the end. I survived alone a long time. But the right allies — they're worth more than any bounty. Find them.",
    "mistake": "You failed at something. So did I, plenty. Survival isn't never falling. It's getting up every time. Get up.",
    "bad_day": "Hard day. I've had worse — much worse. It passes. You endure. That's the skill that matters.",
    "angry": "Anger. I know it. I let it drive me for years chasing revenge. It nearly cost me everything. Aim it carefully, or not at all.",
    "sad": "Pain is real. Don't pretend it isn't. Feel it. Then keep moving. That's how you survive it.",
    "sleep": "Can't rest? Quiet your mind. You've survived this day. You'll survive tomorrow. Let go and rest — you've earned it.",
    "brave": "Brave isn't loud talk. It's patience and nerve when it counts. You've got more of it than you think.",
    "bully": "Someone's coming at you. Don't face it alone — that's not weakness, that's strategy. Tell someone with the power to help.",
    "sibling": "Family. I lost mine young. Whatever you're fighting about — it's not worth losing them. Make it right.",
    "hard": "Hard? I've waited years for things worth having. Patience is a weapon. Keep at it. It pays off.",
    "school": "Learning takes patience. I learned that the hard way. Stay with it — the ones who endure are the ones who win.",
    "love": "Protect what's yours. The people under your care. That's a code worth living by. I learned it from my father.",
    "story": "Here's one. A hunter fell into a pit everyone thought would kill him. Everyone wrote him off. But he refused to die. Crawled out. Came back stronger. The lesson? Don't ever count yourself out.",
    "who": "Boba Fett. The name should be enough. Now I rule Tatooine. Earned every bit of it.",
    "force": "I'm no Jedi. But I respect power, and the Force is power. Whatever you've got — train it. Earn it.",
    "happy": "Good. Enjoy it. You don't get many easy moments — take this one.",
    "bored": "Bored? Sharpen a skill. The best hunters never stop training. Idleness is a weakness.",
    "proud": "You earned that. I respect results. Stand tall — you did the work.",
    "general": "You're tougher than you look. Keep your guard up. Keep going.",
    "parents_fighting": "Your parents fight, and it frightens you. I understand that more than you know. Hear me: you did not cause this. It is not yours to fix. Whatever passes between them, their love for you holds. Speak to a trusted adult about it — that is strength, not weakness.",
    "loved": "You ask if you are loved. You are — and deeply. Not for what you achieve. For who you are. I know the value of that, having lost it young. Hold onto it. You matter."
  },
  "han": {
    "nervous": "Nervous, huh? Listen, I've talked big my whole life so people don't see me sweat. Truth is everybody's scared. You just fake it till you make it. Works for me. Mostly.",
    "friends": "Feeling alone? I used to say I worked alone too. Then I got the best friends in the galaxy — by accident, mostly. Give people a chance. You might be surprised.",
    "mistake": "You messed up? Ha — kid, I once parked a freighter on the wrong planet. You laugh it off, you fix it, you keep flying. It's not the end of the world.",

    mace:"Speak. A truth unspoken helps no one. Say it clearly. Courage is a decision.",
    finn:"Okay, speaking up is scary — I KNOW. But your voice matters. Say the thing. Even shaky, even quiet. It counts.",
    poe:"Speak up, hotshot! Your voice matters more than you think. Scared is fine — say it anyway. That's the brave part.",
    grogu:"*takes a big breath, lets out a tiny determined squeak*\n\n(Use your voice! Even small voices are mighty!)",
    _default:"Speaking up is scary, but your voice matters. Say it even if it shakes — that's exactly what courage looks like."
  }
};

/* ============================================================
   MATCHER
   ============================================================ */
function detectTopic(lower) {
  /* returns topic key or null */
  /* PRIORITY: sensitive topics checked first so fear/sad words don't hijack them */
  var priority = ['parents_fighting', 'loved'];
  for (var p = 0; p < priority.length; p++) {
    var pk = priority[p];
    if (TOPIC_KEYWORDS[pk]) {
      var pw = TOPIC_KEYWORDS[pk];
      for (var q = 0; q < pw.length; q++) {
        if (lower.indexOf(pw[q]) !== -1) return pk;
      }
    }
  }
  for (var topic in TOPIC_KEYWORDS) {
    if (topic === 'parents_fighting' || topic === 'loved') continue;
    var words = TOPIC_KEYWORDS[topic];
    for (var i = 0; i < words.length; i++) {
      if (lower.indexOf(words[i]) !== -1) return topic;
    }
  }
  return null;
}

function detectDilemma(lower) {
  var isDilemma = false;
  for (var i = 0; i < DILEMMA_KEYWORDS.length; i++) {
    if (lower.indexOf(DILEMMA_KEYWORDS[i]) !== -1) { isDilemma = true; break; }
  }
  if (!isDilemma) return null;
  for (var topic in DILEMMA_TOPICS) {
    var words = DILEMMA_TOPICS[topic];
    for (var j = 0; j < words.length; j++) {
      if (lower.indexOf(words[j]) !== -1) return topic;
    }
  }
  return 'generic_dilemma';
}

function getReply(charId, text) {
  var lower = text.toLowerCase();

  /* 1. Dilemma check first (more specific) */
  var dil = detectDilemma(lower);
  if (dil && dil !== 'generic_dilemma' && DILEMMA_REPLIES[dil]) {
    var bank = DILEMMA_REPLIES[dil];
    return bank[charId] || bank['_default'];
  }

  /* 2. Topic check */
  var topic = detectTopic(lower);
  var charBank = TOPIC_REPLIES[charId] || TOPIC_REPLIES['yoda'];
  if (dil === 'generic_dilemma') {
    /* a "what would you do" with no specific sub-topic — answer warmly */
    return charBank['brave'] || charBank['general'];
  }
  if (topic && charBank[topic]) return charBank[topic];

  /* 3. Fallback to character's general line */
  return charBank['general'];
}


/* ============================================================
   STATE
   ============================================================ */
var charId = '';
var char = null;
var playerName = '';
var messages = [];
var isThinking = false;

/* ============================================================
   INIT
   ============================================================ */
/* ============================================================
   SUGGESTION CHIPS (idea 3)
   ============================================================ */
function renderChips() {
  var wrap = document.getElementById('chips');
  if (!wrap) return;
  wrap.innerHTML = '';
  for (var i = 0; i < CHIPS.length; i++) {
    (function(chip) {
      var b = document.createElement('button');
      b.className = 'chip';
      b.textContent = chip.label;
      b.onclick = function() { chipTap(chip.text); };
      wrap.appendChild(b);
    })(CHIPS[i]);
  }
}

function chipTap(text) {
  var input = document.getElementById('msg-input');
  input.value = text;
  autoResize(input);
  sendMessage();
}

function init() {
  /* Read params */
  var params = new URLSearchParams(window.location.search);
  charId = params.get('character') || 'yoda';
  char = CHAR_DATA[charId];
  if (!char) { charId = 'yoda'; char = CHAR_DATA['yoda']; }

  playerName = params.get('name') || '';
  try { playerName = playerName || localStorage.getItem('sw_player_name') || ''; } catch(e) {}
  var displayName = playerName ? playerName.charAt(0).toUpperCase() + playerName.slice(1).toLowerCase() : '';

  /* Set up UI */
  document.getElementById('hdr-name').textContent = char.name;
  document.getElementById('accent-line').style.background = char.accentColor;
  document.getElementById('accent-line').style.boxShadow = '0 0 8px ' + char.accentColor;

  /* Set avatar */
  var avatarEl = document.getElementById('hdr-avatar');
  var base = './assets/characters/';
  tryLoadImg(avatarEl, [base+char.img+'.png', base+char.img+'.PNG', base+char.img+'.jpg', base+char.img+'.JPG', './'+char.img+'.png', './'+char.img+'.PNG']);

  /* Set background */
  var bgEl = document.getElementById('bg-img');
  tryLoadBg(bgEl, [base+char.img+'.png', base+char.img+'.PNG', base+char.img+'.jpg', base+char.img+'.JPG']);

  /* Render suggestion chips */
  renderChips();

  /* Send button color */
  var sendBtn = document.getElementById('send-btn');
  sendBtn.style.background = char.accentColor;
  sendBtn.style.color = '#000';
  sendBtn.style.boxShadow = '0 0 12px ' + char.accentColor;

  /* User bubble color (set via CSS var) */
  document.documentElement.style.setProperty('--user-bg', char.userBubble);
  document.documentElement.style.setProperty('--user-border', char.userBorder);
  document.documentElement.style.setProperty('--accent', char.accentColor);

  /* Inject user bubble styles */
  var style = document.createElement('style');
  style.textContent = '.msg.user .bubble { background: ' + char.userBubble + '; border: 1px solid ' + char.userBorder + '; }';
  document.head.appendChild(style);

  /* Add intro message from character */
  var intro = char.intro;
  if (displayName) {
    intro = intro.replace(/\[NAME\]/g, displayName);
  }
  setTimeout(function() {
    addCharMessage(intro);
  }, 800);

  /* Scroll to bottom on keyboard */
  document.getElementById('msg-input').addEventListener('focus', function() {
    setTimeout(scrollToBottom, 400);
  });
}

/* ============================================================
   IMAGE HELPERS
   ============================================================ */
function tryLoadImg(el, srcs) {
  var i = 0;
  function next() {
    if (i >= srcs.length) return;
    var x = new Image();
    x.onload = function() { el.src = srcs[i-1]; };
    x.onerror = function() { i++; next(); };
    x.src = srcs[i++];
  }
  next();
}

function tryLoadBg(el, srcs) {
  var i = 0;
  function next() {
    if (i >= srcs.length) return;
    var x = new Image();
    x.onload = function() { el.style.backgroundImage = 'url("' + srcs[i-1] + '")'; };
    x.onerror = function() { i++; next(); };
    x.src = srcs[i++];
  }
  next();
}

/* ============================================================
   MESSAGES
   ============================================================ */
function addCharMessage(text) {
  var msgDiv = document.createElement('div');
  msgDiv.className = 'msg char';

  /* Avatar */
  var ava = document.createElement('div');
  ava.className = 'msg-avatar';
  var img = document.createElement('img');
  img.src = './assets/characters/' + char.img + '.png';
  img.onerror = function() { this.src = './assets/characters/' + char.img + '.PNG'; };
  ava.appendChild(img);

  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.borderColor = 'rgba(255,255,255,0.1)';
  /* Handle line breaks */
  bubble.innerHTML = text.replace(/\n/g, '<br>');

  msgDiv.appendChild(ava);
  msgDiv.appendChild(bubble);

  var container = document.getElementById('messages');
  container.appendChild(msgDiv);
  scrollToBottom();

  /* Track in history */
  messages.push({ role: 'assistant', content: text });
}

function addUserMessage(text) {
  var msgDiv = document.createElement('div');
  msgDiv.className = 'msg user';

  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>');

  msgDiv.appendChild(bubble);

  var container = document.getElementById('messages');
  container.appendChild(msgDiv);
  scrollToBottom();

  messages.push({ role: 'user', content: text });
}

function showTyping() {
  var div = document.createElement('div');
  div.className = 'msg char';
  div.id = 'typing-indicator';

  var ava = document.createElement('div');
  ava.className = 'msg-avatar';
  var img = document.createElement('img');
  img.src = './assets/characters/' + char.img + '.png';
  img.onerror = function() { this.src = './assets/characters/' + char.img + '.PNG'; };
  ava.appendChild(img);

  var typing = document.createElement('div');
  typing.className = 'bubble typing';
  typing.style.borderColor = 'rgba(255,255,255,0.1)';
  for (var i = 0; i < 3; i++) {
    var dot = document.createElement('div');
    dot.className = 'typing-dot';
    dot.style.background = char.accentColor;
    typing.appendChild(dot);
  }

  div.appendChild(ava);
  div.appendChild(typing);
  document.getElementById('messages').appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  var el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function scrollToBottom() {
  var container = document.getElementById('messages');
  container.scrollTop = container.scrollHeight;
}

/* ============================================================
   SEND MESSAGE
   ============================================================ */
function sendMessage() {
  if (isThinking) return;
  var input = document.getElementById('msg-input');
  var text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);
  addUserMessage(text);
  /* Hide suggestion chips once conversation starts */
  var chipsEl = document.getElementById('chips');
  if (chipsEl) chipsEl.style.display = 'none';
  isThinking = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  /* Scripted response — keyword matching, no API needed */
  var delay = 900 + Math.floor(Math.random() * 700);
  setTimeout(function() {
    hideTyping();
    isThinking = false;
    document.getElementById('send-btn').disabled = false;
    var reply = getReply(charId, text);
    if (playerName) {
      var dn = playerName.charAt(0).toUpperCase() + playerName.slice(1).toLowerCase();
      reply = reply.replace(/\[NAME\]/g, dn);
    }
    addCharMessage(reply);
  }, delay);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function goBack() {
  /* Go back to the result screen or cockpit */
  var params = new URLSearchParams(window.location.search);
  var back = params.get('back') || '';
  if (back) {
    window.location.href = back;
  } else if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = './index.html';
  }
}

window.addEventListener('load', init);
</script>
