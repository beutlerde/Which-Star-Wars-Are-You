<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Star Wars — Which Character Are You?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000008;
  -webkit-font-smoothing:antialiased;
  user-select:none; -webkit-user-select:none;
}

/* ── Layer 1: deep space ── */
#space-bg {
  position:fixed; inset:0; z-index:1;
  background: radial-gradient(ellipse 140% 120% at 50% 30%,
    #040C1E 0%, #020610 50%, #000308 100%);
}

/* ── Layer 2: stars, nebulae, planets, text ── */
#space-layer {
  position:fixed; inset:0; z-index:2;
  overflow:hidden;
  pointer-events:none;
}

/* ── Layer 3: cockpit PNG foreground ── */
#cockpit-frame {
  position:fixed; inset:0; z-index:10;
  pointer-events:none;
  background-image: url('./cockpit-bg.PNG');
  background-size: auto 52vh;
  background-position: center bottom;
  background-repeat: no-repeat;
}

/* ============================================================
   STARS
   ============================================================ */
.star {
  position:absolute; border-radius:50%; background:white;
  animation: tw var(--d) var(--dl) ease-in-out infinite alternate;
}
@keyframes tw {
  from { opacity:var(--lo); transform:scale(0.6); }
  to   { opacity:var(--hi); transform:scale(1.4); }
}

/* ============================================================
   NEBULAE
   ============================================================ */
.nebula {
  position:absolute; border-radius:50%;
  filter:blur(70px); pointer-events:none;
  animation: nd var(--nd) ease-in-out infinite alternate;
}
@keyframes nd {
  from { transform:translate(0,0) scale(1); }
  to   { transform:translate(18px,-12px) scale(1.1); }
}

/* ============================================================
   TITLE
   ============================================================ */
#title-block {
  position:absolute;
  top:3%; left:50%;
  transform:translateX(-50%);
  text-align:center; z-index:5;
  pointer-events:none; white-space:nowrap;
  animation: tfi 1.8s ease-out forwards;
}
@keyframes tfi {
  from { opacity:0; transform:translateX(-50%) translateY(-12px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}
.t-eye {
  font-family:'Orbitron',monospace;
  font-size:7px; letter-spacing:3.5px;
  color:rgba(255,255,255,0.22);
  text-transform:uppercase; margin-bottom:5px;
}
.t-main {
  font-family:'Orbitron',monospace;
  font-weight:900; letter-spacing:3px;
  text-transform:uppercase; line-height:1.25;
  color:white;
  text-shadow:
    0 0 30px rgba(255,150,30,0.6),
    0 0 70px rgba(255,100,0,0.25),
    0 2px 6px rgba(0,0,0,0.95);
}
.t-rule {
  width:44px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,150,30,0.6),transparent);
  margin:7px auto;
}
.t-sub {
  font-family:'Rajdhani',sans-serif;
  font-size:9px; letter-spacing:2.5px;
  color:rgba(255,255,255,0.3);
  text-transform:uppercase;
}

/* ============================================================
   YODA QUOTE
   ============================================================ */
#yoda-block {
  position:absolute;
  left:50%; transform:translateX(-50%);
  text-align:center; z-index:5;
  pointer-events:none; white-space:nowrap;
  animation: yfi 2.5s ease-out 1.5s both;
}
@keyframes yfi {
  from { opacity:0; transform:translateX(-50%) translateY(8px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}
.y-quote {
  font-family:'Rajdhani',sans-serif;
  font-weight:500; letter-spacing:1px;
  color:rgba(0,215,255,0.5);
  font-style:italic;
}
.y-attr {
  font-family:'Orbitron',monospace;
  font-size:7px; letter-spacing:2px;
  color:rgba(255,255,255,0.18);
  margin-top:3px; text-transform:uppercase;
}

/* ============================================================
   PLANETS — real image-based
   ============================================================ */
.pw {
  position:absolute;
  cursor:pointer;
  pointer-events:all;
  z-index:6;
}

/* atmospheric glow behind the planet image */
.pg {
  position:absolute;
  border-radius:50%;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  filter:blur(22px);
  pointer-events:none;
  animation: gp var(--gd,3.5s) ease-in-out infinite alternate;
}
@keyframes gp {
  from { opacity:0.4; transform:translate(-50%,-50%) scale(0.8); }
  to   { opacity:0.9; transform:translate(-50%,-50%) scale(1.2); }
}

/* planet image */
.pi {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  object-fit:contain;
  pointer-events:none;
  filter: drop-shadow(0 0 12px var(--shadow-color,rgba(255,255,255,0.3)));
  transition:transform 0.15s ease, filter 0.15s ease;
}
.pw:active .pi {
  transform:scale(0.9);
  filter: drop-shadow(0 0 20px var(--shadow-color,rgba(255,255,255,0.5))) brightness(1.1);
}

/* tap ripple */
.prip {
  position:absolute;
  top:50%; left:50%;
  border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.5);
  transform:translate(-50%,-50%) scale(0.7);
  opacity:0; pointer-events:none;
}
.pw.tap .prip {
  animation:rip 0.55s ease-out forwards;
}
@keyframes rip {
  from { opacity:0.85; transform:translate(-50%,-50%) scale(0.7); }
  to   { opacity:0;   transform:translate(-50%,-50%) scale(2.4); }
}

/* label */
.plabel {
  position:absolute; left:50%;
  transform:translateX(-50%);
  text-align:center; white-space:nowrap;
  pointer-events:none;
}
.pm {
  display:block;
  font-family:'Orbitron',monospace;
  font-weight:700; letter-spacing:2px;
  text-transform:uppercase;
  text-shadow:0 0 14px currentColor, 0 1px 6px rgba(0,0,0,1);
}
.ps {
  display:block;
  font-family:'Rajdhani',sans-serif;
  font-weight:500; letter-spacing:1px;
  opacity:0.62;
  text-shadow:0 1px 6px rgba(0,0,0,1);
}

/* ============================================================
   LIGHTSPEED
   ============================================================ */
#ls {
  position:fixed; inset:0; z-index:100;
  opacity:0; pointer-events:none;
  background:#000008;
}
#ls.on { opacity:1; pointer-events:all; }
#ls-canvas { position:absolute; inset:0; width:100%; height:100%; }

#ls-dest {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; transition:opacity 0.65s ease;
  padding:28px;
}
#ls-dest.show { opacity:1; }

#ls-planet-img {
  object-fit:contain;
  margin-bottom:28px;
  flex-shrink:0;
  animation:lspp 2.2s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 30px var(--pg1)) drop-shadow(0 0 60px var(--pg2));
}
@keyframes lspp {
  from { filter:drop-shadow(0 0 25px var(--pg1)) drop-shadow(0 0 50px var(--pg2)); transform:scale(1); }
  to   { filter:drop-shadow(0 0 50px var(--pg1)) drop-shadow(0 0 100px var(--pg2)); transform:scale(1.04); }
}

.ls-title {
  font-family:'Orbitron',monospace;
  font-size:clamp(16px,5.5vw,26px);
  font-weight:900; letter-spacing:5px;
  text-transform:uppercase; color:white;
  margin-bottom:6px; text-align:center;
}
.ls-planet-name {
  font-family:'Rajdhani',sans-serif;
  font-size:13px; letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:6px; text-align:center;
}
.ls-sub {
  font-family:'Rajdhani',sans-serif;
  font-size:12px; letter-spacing:2px;
  color:rgba(255,255,255,0.38);
  text-transform:uppercase;
  margin-bottom:38px; text-align:center;
}
.ls-btn {
  padding:15px 44px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:4px;
  font-family:'Orbitron',monospace;
  font-size:11px; font-weight:700;
  letter-spacing:4px; color:white;
  text-transform:uppercase; cursor:pointer;
  -webkit-appearance:none;
  transition:all 0.2s;
}
.ls-btn:active {
  background:rgba(255,255,255,0.14);
  border-color:rgba(255,255,255,0.55);
}

</style>
</head>
<body>

<div id="space-bg"></div>
<div id="space-layer"></div>
<div id="cockpit-frame"></div>

<div id="ls">
  <canvas id="ls-canvas"></canvas>
  <div id="ls-dest">
    <img id="ls-planet-img" src="" alt="">
    <div class="ls-title" id="ls-title"></div>
    <div class="ls-planet-name" id="ls-pname"></div>
    <div class="ls-sub" id="ls-sub"></div>
    <button class="ls-btn" id="ls-btn">ENTER &rarr;</button>
  </div>
</div>

<script>

/* ============================================================
   PLANET CONFIG
   ============================================================ */
var PD = {
  tatooine: {
    img:        './tatooine.PNG',
    label:      'TAKE THE QUIZ',
    planetName: 'TATOOINE',
    sub:        'Which character are you?',
    color:      '#FFB055',
    glowColor:  'rgba(255,150,40,0.5)',
    g1:         'rgba(255,150,40,1)',
    g2:         'rgba(200,90,0,0.5)',
    shadow:     'rgba(255,140,30,0.55)',
    glowDur:    '3.2s',
    href:       'quiz.html'
  },
  coruscant: {
    img:        './coruscant.PNG',
    label:      'FORCE MAP',
    planetName: 'CORUSCANT',
    sub:        'Your galaxy',
    color:      '#44CCFF',
    glowColor:  'rgba(0,180,255,0.45)',
    g1:         'rgba(0,190,255,1)',
    g2:         'rgba(0,100,220,0.5)',
    shadow:     'rgba(0,180,255,0.55)',
    glowDur:    '4s',
    href:       '#'
  },
  dagobah: {
    img:        './dagobah.PNG',
    label:      'TRANSMISSIONS',
    planetName: 'DAGOBAH',
    sub:        'Messages from Dad',
    color:      '#44EE88',
    glowColor:  'rgba(0,200,100,0.45)',
    g1:         'rgba(0,210,110,1)',
    g2:         'rgba(0,130,60,0.5)',
    shadow:     'rgba(0,200,100,0.55)',
    glowDur:    '3.8s',
    href:       '#'
  },
  hoth: {
    img:        './hoth.PNG',
    label:      'ARCHIVE',
    planetName: 'HOTH',
    sub:        'Past results',
    color:      '#AADDFF',
    glowColor:  'rgba(150,210,255,0.4)',
    g1:         'rgba(160,215,255,1)',
    g2:         'rgba(80,160,230,0.45)',
    shadow:     'rgba(150,210,255,0.5)',
    glowDur:    '4.5s',
    href:       '#'
  }
};

/* ============================================================
   BUILD PLANET ELEMENTS
   ============================================================ */
var sl   = document.getElementById('space-layer');
var pels = {};
var lsDest = null;

Object.keys(PD).forEach(function(key) {
  var d = PD[key];

  var wrap = document.createElement('div');
  wrap.className = 'pw';

  var glow = document.createElement('div');
  glow.className = 'pg';
  glow.style.setProperty('--gd', d.glowDur);
  glow.style.background = d.glowColor;

  var img = document.createElement('img');
  img.className = 'pi';
  img.src = d.img;
  img.style.setProperty('--shadow-color', d.shadow);

  var rip = document.createElement('div');
  rip.className = 'prip';

  var label = document.createElement('div');
  label.className = 'plabel';
  label.innerHTML =
    '<span class="pm" style="color:' + d.color + '">' + d.label + '</span>' +
    '<span class="ps" style="color:' + d.color + '">' + d.sub + '</span>';

  wrap.appendChild(glow);
  wrap.appendChild(img);
  wrap.appendChild(rip);
  wrap.appendChild(label);
  sl.appendChild(wrap);

  pels[key] = { wrap:wrap, glow:glow, img:img, rip:rip, label:label };

  wrap.addEventListener('click', function() {
    wrap.classList.add('tap');
    setTimeout(function() { wrap.classList.remove('tap'); }, 600);
    setTimeout(function() { launchLS(key); }, 480);
  });
});

/* Title + Yoda appended to space-layer */
var titleEl = document.createElement('div');
titleEl.id = 'title-block';
titleEl.innerHTML =
  '<div class="t-eye">A long time ago in a galaxy far, far away&hellip;</div>' +
  '<div class="t-main" id="tmain">WHICH STAR WARS<br>CHARACTER ARE YOU?</div>' +
  '<div class="t-rule"></div>' +
  '<div class="t-sub">Choose your destination</div>';
sl.appendChild(titleEl);

var yodaEl = document.createElement('div');
yodaEl.id = 'yoda-block';
yodaEl.innerHTML =
  '<div class="y-quote">&ldquo;Choose your destination, you must.&rdquo;</div>' +
  '<div class="y-attr">&mdash; Master Yoda</div>';
sl.appendChild(yodaEl);

/* ============================================================
   LAYOUT
   Image: 1376×768, background-size:100% auto, position:center bottom
   ============================================================ */
function layout() {
  var vw = window.innerWidth;
  var vh = window.innerHeight;

  /* background-size: auto 52vh — image height = 52% of viewport height */
  /* image width scales proportionally, centered horizontally */
  var imgR  = 1376 / 768;
  var rendH = vh * 0.52;
  var rendW = rendH * imgR;
  var offX  = (vw - rendW) / 2;  /* negative if wider than screen = crops sides */
  var offY  = vh - rendH;        /* anchored to bottom */

  /* Arch glass zone */
  var archTop    = offY + rendH * 0.02;
  var archBottom = offY + rendH * 0.75;
  var archH      = archBottom - archTop;
  var archCX     = vw / 2;

  /* Safe horizontal zone — arch narrows toward top */
  var safeL = offX + rendW * 0.14;
  var safeR = offX + rendW * 0.86;
  var safeW = safeR - safeL;

  /* Planet sizes — relative to arch height which is now much larger */
  var unit   = Math.min(safeW, archH);
  var mainSz = unit * 0.28;   /* Tatooine — hero */
  var secSz  = unit * 0.17;   /* Coruscant + Dagobah */
  var smSz   = unit * 0.12;   /* Hoth — distant */

  /* Spread planets across the full arch opening */
  var pos = {
    tatooine:  { cx: archCX,               cy: archTop + archH * 0.55, sz: mainSz },
    coruscant: { cx: safeL + safeW * 0.18, cy: archTop + archH * 0.28, sz: secSz  },
    dagobah:   { cx: safeL + safeW * 0.82, cy: archTop + archH * 0.25, sz: secSz  },
    hoth:      { cx: safeL + safeW * 0.80, cy: archTop + archH * 0.65, sz: smSz   }
  };

  Object.keys(pos).forEach(function(key) {
    var p  = pos[key];
    var sz = p.sz;
    var e  = pels[key];

    e.wrap.style.left   = (p.cx - sz/2) + 'px';
    e.wrap.style.top    = (p.cy - sz/2) + 'px';
    e.wrap.style.width  = sz + 'px';
    e.wrap.style.height = sz + 'px';

    var gSz = sz * 1.9;
    e.glow.style.width  = gSz + 'px';
    e.glow.style.height = gSz + 'px';

    var rSz = sz * 1.4;
    e.rip.style.width      = rSz + 'px';
    e.rip.style.height     = rSz + 'px';
    e.rip.style.marginLeft = (-rSz/2) + 'px';
    e.rip.style.marginTop  = (-rSz/2) + 'px';

    e.label.style.top = (sz * 0.56) + 'px';
    var mF = Math.max(7, Math.min(11, sz * 0.12));
    var sF = Math.max(6, Math.min(9,  sz * 0.10));
    e.label.querySelector('.pm').style.fontSize = mF + 'px';
    e.label.querySelector('.ps').style.fontSize = sF + 'px';
  });

  /* Title font size */
  var tSz = Math.max(13, Math.min(22, safeW * 0.057));
  var tm = document.getElementById('tmain');
  if (tm) tm.style.fontSize = tSz + 'px';

  /* Yoda position */
  yodaEl.style.top = (archBottom - 36) + 'px';
  var qF = Math.max(10, Math.min(14, vw * 0.034));
  var qEl = yodaEl.querySelector('.y-quote');
  if (qEl) qEl.style.fontSize = qF + 'px';

  /* LS planet size */
  var lsSz = Math.min(vw, vh) * 0.35;
  document.getElementById('ls-planet-img').style.width  = lsSz + 'px';
  document.getElementById('ls-planet-img').style.height = lsSz + 'px';
}

/* ============================================================
   STARS
   ============================================================ */
function buildStars() {
  for (var i = 0; i < 160; i++) {
    var s  = document.createElement('div');
    s.className = 'star';
    var big = Math.random() < 0.1;
    var sz  = big ? (1.5 + Math.random()*2.2) : (0.3 + Math.random()*1.0);
    var lo  = (0.06 + Math.random()*0.14).toFixed(2);
    var hi  = (0.45 + Math.random()*0.5).toFixed(2);
    var d   = (2 + Math.random()*4.5).toFixed(1) + 's';
    var dl  = (Math.random()*7).toFixed(1) + 's';
    s.style.cssText =
      'width:'+sz+'px;height:'+sz+'px;' +
      'left:'+(10+Math.random()*80).toFixed(1)+'%;' +
      'top:' +(Math.random()*72).toFixed(1)+'%;' +
      '--lo:'+lo+';--hi:'+hi+';--d:'+d+';--dl:'+dl+';';
    sl.insertBefore(s, sl.firstChild);
  }
}

/* ============================================================
   NEBULAE
   ============================================================ */
function buildNebulae() {
  [
    {w:380,h:220,t:6, l:6,  c:'rgba(55,0,140,0.07)', nd:'24s'},
    {w:320,h:180,t:14,l:54, c:'rgba(0,70,190,0.055)',nd:'18s'},
    {w:260,h:150,t:30,l:24, c:'rgba(160,55,0,0.045)',nd:'29s'}
  ].forEach(function(sp) {
    var n = document.createElement('div');
    n.className = 'nebula';
    n.style.cssText =
      'width:'+sp.w+'px;height:'+sp.h+'px;' +
      'top:'+sp.t+'%;left:'+sp.l+'%;' +
      'background:'+sp.c+';--nd:'+sp.nd+';';
    sl.appendChild(n);
  });
}

/* ============================================================
   FLOAT
   ============================================================ */
var fp = {}, ft = 0;
Object.keys(PD).forEach(function(k) { fp[k] = Math.random() * Math.PI * 2; });

function floatTick() {
  ft += 0.014;
  Object.keys(PD).forEach(function(k, i) {
    var el  = pels[k].wrap;
    var spd = 0.45 + i * 0.11;
    var amp = 3 + i * 1.2;
    var dy  = Math.sin(ft * spd + fp[k]) * amp;
    var dx  = Math.cos(ft * spd * 0.52 + fp[k]) * (amp * 0.36);
    el.style.transform = 'translate('+dx.toFixed(2)+'px,'+dy.toFixed(2)+'px)';
  });
  requestAnimationFrame(floatTick);
}

/* ============================================================
   LIGHTSPEED
   ============================================================ */
var lsCanvas = document.getElementById('ls-canvas');
var lsCtx    = lsCanvas.getContext('2d');
var lsRaf    = null;

document.getElementById('ls-btn').addEventListener('click', closeLS);

function launchLS(key) {
  var d = PD[key];
  lsDest = key;
  document.getElementById('ls').classList.add('on');

  lsCanvas.width  = window.innerWidth;
  lsCanvas.height = window.innerHeight;

  /* Set destination panel */
  var pimg = document.getElementById('ls-planet-img');
  pimg.src = d.img;
  pimg.style.setProperty('--pg1', d.g1);
  pimg.style.setProperty('--pg2', d.g2);
  document.getElementById('ls-title').textContent = d.label;
  document.getElementById('ls-title').style.color = d.color;
  document.getElementById('ls-pname').textContent = d.planetName;
  document.getElementById('ls-pname').style.color = d.color;
  document.getElementById('ls-pname').style.textShadow = '0 0 12px ' + d.g1;
  document.getElementById('ls-sub').textContent = d.sub;

  /* Stars */
  var cx = lsCanvas.width/2, cy = lsCanvas.height/2;
  var stars = [];
  for (var i=0;i<240;i++) {
    var angle = Math.random()*Math.PI*2;
    var dist  = 12 + Math.random()*Math.min(cx,cy)*0.9;
    stars.push({ angle:angle, dist:dist,
      spd:0.35+Math.random()*2.4,
      sz: 0.4+Math.random()*1.5,
      br: 150+Math.floor(Math.random()*105) });
  }

  var t0=null, STRE=1100, FLASH=260, phase=1;

  function frame(ts) {
    if (!t0) t0=ts;
    var el=ts-t0;
    lsCtx.clearRect(0,0,lsCanvas.width,lsCanvas.height);
    lsCtx.fillStyle='#000008';
    lsCtx.fillRect(0,0,lsCanvas.width,lsCanvas.height);

    if (phase===1) {
      var t=Math.min(el/STRE,1), e=t*t*(3-2*t);
      stars.forEach(function(st) {
        var stretch=1+e*26*st.spd;
        var dn=st.dist*(1+e*5.5);
        var sx=cx+Math.cos(st.angle)*dn, sy=cy+Math.sin(st.angle)*dn;
        var ex=cx+Math.cos(st.angle)*(dn+stretch*9), ey=cy+Math.sin(st.angle)*(dn+stretch*9);
        lsCtx.beginPath(); lsCtx.moveTo(sx,sy); lsCtx.lineTo(ex,ey);
        var b=st.br;
        lsCtx.strokeStyle='rgba('+b+','+b+','+Math.min(255,b+45)+','+(0.3+e*0.7)+')';
        lsCtx.lineWidth=st.sz*(1+e*2.8); lsCtx.stroke();
      });
      var g=lsCtx.createRadialGradient(cx,cy,0,cx,cy,130*e);
      g.addColorStop(0,'rgba(180,220,255,'+(e*0.55)+')');
      g.addColorStop(1,'transparent');
      lsCtx.fillStyle=g;
      lsCtx.fillRect(0,0,lsCanvas.width,lsCanvas.height);
      if (el>=STRE){phase=2;t0=ts;}
      lsRaf=requestAnimationFrame(frame);

    } else if (phase===2) {
      var tf=el/FLASH;
      var op=tf<0.4?tf/0.4:1-((tf-0.4)/0.6);
      lsCtx.fillStyle='rgba(255,255,255,'+Math.max(0,Math.min(1,op))+')';
      lsCtx.fillRect(0,0,lsCanvas.width,lsCanvas.height);
      if (el>=FLASH){
        document.getElementById('ls-dest').classList.add('show');
        return;
      }
      lsRaf=requestAnimationFrame(frame);
    }
  }
  lsRaf=requestAnimationFrame(frame);
}

function closeLS() {
  document.getElementById('ls-dest').classList.remove('show');
  setTimeout(function() {
    document.getElementById('ls').classList.remove('on');
    if (lsRaf){cancelAnimationFrame(lsRaf);lsRaf=null;}
    lsCtx.clearRect(0,0,lsCanvas.width,lsCanvas.height);
  },400);
  if (lsDest && PD[lsDest].href !== '#') {
    setTimeout(function(){ window.location.href=PD[lsDest].href; },520);
  }
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  buildStars();
  buildNebulae();
  layout();
  floatTick();
}
window.addEventListener('load', init);
window.addEventListener('resize', layout);

</script>
