<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Star Wars — Which Character Are You?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000008;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Layer 1: deep space ── */
#space-bg {
  position: fixed; inset: 0; z-index: 1;
  background: radial-gradient(ellipse 130% 110% at 50% 35%,
    #040C1E 0%, #020610 55%, #000308 100%);
}

/* ── Layer 2: stars, nebula, planets, text ── */
#space-layer {
  position: fixed; inset: 0; z-index: 2;
  overflow: hidden;
  pointer-events: none;
}

/* ── Layer 3: cockpit PNG ── */
#cockpit-frame {
  position: fixed; inset: 0; z-index: 10;
  pointer-events: none;
  background-image: url('./cockpit-bg.PNG');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
}

/* ============================================================
   STARS
   ============================================================ */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: tw var(--d) var(--dl) ease-in-out infinite alternate;
}
@keyframes tw {
  from { opacity: var(--lo); transform: scale(0.65); }
  to   { opacity: var(--hi); transform: scale(1.35); }
}

/* ============================================================
   NEBULAE
   ============================================================ */
.nebula {
  position: absolute;
  border-radius: 50%;
  filter: blur(65px);
  pointer-events: none;
  animation: nd var(--nd) ease-in-out infinite alternate;
}
@keyframes nd {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(16px,-12px) scale(1.09); }
}

/* ============================================================
   TITLE BLOCK — top of arch
   ============================================================ */
#title-block {
  position: absolute;
  top: 3%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 5;
  pointer-events: none;
  white-space: nowrap;
  animation: tfi 2s ease-out forwards;
}
@keyframes tfi {
  from { opacity:0; transform: translateX(-50%) translateY(-10px); }
  to   { opacity:1; transform: translateX(-50%) translateY(0); }
}
.t-eye {
  font-family: 'Orbitron', monospace;
  font-size: 7px;
  letter-spacing: 3.5px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  margin-bottom: 5px;
}
.t-main {
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  line-height: 1.25;
  color: white;
  text-shadow:
    0 0 35px rgba(255,155,35,0.55),
    0 0 70px rgba(255,100,0,0.2),
    0 2px 5px rgba(0,0,0,0.9);
}
.t-rule {
  width: 48px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,155,35,0.55), transparent);
  margin: 7px auto;
}
.t-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: 9px;
  letter-spacing: 2.5px;
  color: rgba(255,255,255,0.32);
  text-transform: uppercase;
}

/* ============================================================
   YODA QUOTE — just above dashboard
   ============================================================ */
#yoda-block {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 5;
  pointer-events: none;
  white-space: nowrap;
  animation: yfi 2.5s ease-out 1.4s both;
}
@keyframes yfi {
  from { opacity:0; transform: translateX(-50%) translateY(6px); }
  to   { opacity:1; transform: translateX(-50%) translateY(0); }
}
.y-quote {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  letter-spacing: 1px;
  color: rgba(0,210,255,0.52);
  font-style: italic;
}
.y-attr {
  font-family: 'Orbitron', monospace;
  font-size: 7px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.18);
  margin-top: 3px;
  text-transform: uppercase;
}

/* ============================================================
   PLANETS
   ============================================================ */
.pw {
  position: absolute;
  cursor: pointer;
  pointer-events: all;
  z-index: 6;
}

/* glow halo */
.pg {
  position: absolute;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  filter: blur(20px);
  pointer-events: none;
  animation: gp var(--gd, 3.5s) ease-in-out infinite alternate;
}
@keyframes gp {
  from { opacity: 0.45; transform: translate(-50%,-50%) scale(0.82); }
  to   { opacity: 1;    transform: translate(-50%,-50%) scale(1.2); }
}

/* sphere */
.pb {
  border-radius: 50%;
  position: absolute;
  top: 0; left: 0;
  overflow: hidden;
  box-shadow:
    inset -6px -6px 16px rgba(0,0,0,0.65),
    inset 2px 2px 9px rgba(255,255,255,0.13);
  transition: transform 0.12s ease;
}
.pw:active .pb { transform: scale(0.87); }

/* ring — quiz planet only */
.pr {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 50%;
  border: 2px solid rgba(255,195,80,0.22);
  transform: translate(-50%,-50%) rotateX(68deg);
  pointer-events: none;
}

/* tap ripple */
.prip {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.6);
  transform: translate(-50%,-50%) scale(0.7);
  opacity: 0;
  pointer-events: none;
}
.pw.tap .prip {
  animation: rip 0.52s ease-out forwards;
}
@keyframes rip {
  from { opacity:0.8; transform:translate(-50%,-50%) scale(0.7); }
  to   { opacity:0;   transform:translate(-50%,-50%) scale(2.5); }
}

/* label */
.plabel {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  white-space: nowrap;
  pointer-events: none;
}
.pm {
  display: block;
  font-family: 'Orbitron', monospace;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 0 12px currentColor, 0 1px 6px rgba(0,0,0,1);
}
.ps {
  display: block;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  letter-spacing: 1px;
  opacity: 0.65;
  text-shadow: 0 1px 6px rgba(0,0,0,1);
}

/* ============================================================
   LIGHTSPEED
   ============================================================ */
#ls {
  position: fixed; inset: 0; z-index: 100;
  opacity: 0; pointer-events: none;
  background: #000008;
}
#ls.on { opacity:1; pointer-events:all; }
#ls-canvas { position:absolute; inset:0; width:100%; height:100%; }

#ls-dest {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.65s ease;
  padding: 24px;
}
#ls-dest.show { opacity:1; }

.lsp {
  border-radius: 50%;
  margin-bottom: 28px;
  flex-shrink: 0;
  animation: lsp 2.2s ease-in-out infinite alternate;
}
@keyframes lsp {
  from { box-shadow: 0 0 50px var(--g1), 0 0 100px var(--g2); }
  to   { box-shadow: 0 0 90px var(--g1), 0 0 180px var(--g2); }
}
.lst {
  font-family: 'Orbitron', monospace;
  font-size: clamp(18px,5.5vw,28px);
  font-weight: 900;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: white;
  margin-bottom: 8px;
  text-align: center;
}
.lss {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  margin-bottom: 38px;
  text-align: center;
}
.lsbtn {
  padding: 15px 44px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 4px;
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  color: white;
  text-transform: uppercase;
  cursor: pointer;
  -webkit-appearance: none;
}
.lsbtn:active {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.6);
}

</style>
</head>
<body>

<div id="space-bg"></div>
<div id="space-layer"></div>
<div id="cockpit-frame"></div>

<div id="ls">
  <canvas id="ls-canvas"></canvas>
  <div id="ls-dest">
    <div class="lsp" id="lsp"></div>
    <div class="lst" id="lst"></div>
    <div class="lss" id="lss"></div>
    <button class="lsbtn" id="lsbtn">ENTER &rarr;</button>
  </div>
</div>

<script>

/* ============================================================
   PLANET CONFIG
   ============================================================ */
var PD = {
  quiz: {
    label: 'TAKE THE QUIZ',
    sub: 'Which character are you?',
    color: '#FFAA44',
    gradient: 'radial-gradient(circle at 36% 32%, #FFCC66, #CC6600 42%, #7A3300 72%, #2A0E00)',
    glowColor: 'rgba(255,140,0,0.45)',
    g1: 'rgba(255,140,0,0.8)',
    g2: 'rgba(255,80,0,0.3)',
    ring: true,
    glowDur: '3.2s',
    href: 'quiz.html'
  },
  map: {
    label: 'FORCE MAP',
    sub: 'Your galaxy',
    color: '#44DDFF',
    gradient: 'radial-gradient(circle at 38% 30%, #77EEFF, #0099CC 42%, #004477 72%, #000E1A)',
    glowColor: 'rgba(0,200,255,0.4)',
    g1: 'rgba(0,200,255,0.8)',
    g2: 'rgba(0,130,255,0.28)',
    ring: false,
    glowDur: '4.1s',
    href: '#'
  },
  tx: {
    label: 'TRANSMISSIONS',
    sub: 'Messages from Dad',
    color: '#CC88FF',
    gradient: 'radial-gradient(circle at 38% 30%, #EE99FF, #8822CC 42%, #3A0077 72%, #0E001F)',
    glowColor: 'rgba(180,80,255,0.4)',
    g1: 'rgba(180,80,255,0.8)',
    g2: 'rgba(130,40,255,0.28)',
    ring: false,
    glowDur: '3.8s',
    href: '#'
  },
  archive: {
    label: 'ARCHIVE',
    sub: 'Past results',
    color: '#44FF99',
    gradient: 'radial-gradient(circle at 40% 32%, #88FFCC, #00AA55 44%, #004422 72%, #000E07)',
    glowColor: 'rgba(0,220,130,0.4)',
    g1: 'rgba(0,220,130,0.8)',
    g2: 'rgba(0,160,90,0.28)',
    ring: false,
    glowDur: '4.5s',
    href: '#'
  }
};

/* ============================================================
   BUILD PLANET ELEMENTS
   ============================================================ */
var sl     = document.getElementById('space-layer');
var pels   = {};
var lsDest = null;

Object.keys(PD).forEach(function(key) {
  var d = PD[key];

  var wrap = document.createElement('div');
  wrap.className = 'pw';

  var glow = document.createElement('div');
  glow.className = 'pg';
  glow.style.setProperty('--gd', d.glowDur);
  glow.style.background = d.glowColor;

  var body = document.createElement('div');
  body.className = 'pb';
  body.style.background = d.gradient;

  var ring = null;
  if (d.ring) {
    ring = document.createElement('div');
    ring.className = 'pr';
  }

  var rip = document.createElement('div');
  rip.className = 'prip';

  var label = document.createElement('div');
  label.className = 'plabel';
  label.innerHTML =
    '<span class="pm" style="color:' + d.color + '">' + d.label + '</span>' +
    '<span class="ps" style="color:' + d.color + '">' + d.sub + '</span>';

  wrap.appendChild(glow);
  wrap.appendChild(body);
  if (ring) wrap.appendChild(ring);
  wrap.appendChild(rip);
  wrap.appendChild(label);
  sl.appendChild(wrap);

  pels[key] = { wrap:wrap, glow:glow, body:body, ring:ring, rip:rip, label:label };

  wrap.addEventListener('click', function() {
    wrap.classList.add('tap');
    setTimeout(function() { wrap.classList.remove('tap'); }, 600);
    setTimeout(function() { launchLS(key); }, 500);
  });
});

/* Build title and yoda blocks inside space-layer */
var titleEl = document.createElement('div');
titleEl.id = 'title-block';
titleEl.innerHTML =
  '<div class="t-eye">A long time ago in a galaxy far, far away&hellip;</div>' +
  '<div class="t-main" id="t-main-text">WHICH STAR WARS<br>CHARACTER ARE YOU?</div>' +
  '<div class="t-rule"></div>' +
  '<div class="t-sub">Choose your destination</div>';
sl.appendChild(titleEl);

var yodaEl = document.createElement('div');
yodaEl.id = 'yoda-block';
yodaEl.innerHTML =
  '<div class="y-quote">&ldquo;Choose your destination, you must.&rdquo;</div>' +
  '<div class="y-attr">&mdash; Master Yoda</div>';
sl.appendChild(yodaEl);

/* ============================================================
   LAYOUT  — recalculates on every resize
   Image native: 1376 × 768  (ratio 1.792)
   Arch opens from top, widening as it descends.
   Glass bottom ≈ 75.5% of rendered image height.
   ============================================================ */
function layout() {
  var vw = window.innerWidth;
  var vh = window.innerHeight;

  /* How is the 1376×768 image rendered with background-size:cover? */
  var imgR = 1376 / 768;
  var rendW, rendH, offX, offY;
  if (vw / vh >= imgR) {
    rendW = vw;
    rendH = vw / imgR;
    offX  = 0;
    offY  = (vh - rendH) / 2;
  } else {
    rendH = vh;
    rendW = vh * imgR;
    offX  = (vw - rendW) / 2;
    offY  = 0;
  }

  /* Glass arch bounds in screen pixels */
  /* Top of arch is at rendered y=0 (transparent from row 0) */
  /* Bottom of arch (dashboard top) ≈ 75.5% of rendH */
  var archTop    = offY + rendH * 0.02;   /* tiny top margin */
  var archBottom = offY + rendH * 0.755;  /* dashboard starts here */
  var archHeight = archBottom - archTop;
  var archCX     = vw / 2;

  /* At mid-arch (50% down), the glass spans 7%–93% of rendW */
  /* We use a slightly inset safe zone so planets stay in the glass */
  var safeL = offX + rendW * 0.15;
  var safeR = offX + rendW * 0.85;
  var safeW = safeR - safeL;

  /* Planet sizes — based on available arch area */
  var unit    = Math.min(safeW, archHeight);
  var quizSz  = unit * 0.20;   /* main planet — prominent but not huge */
  var secSz   = unit * 0.13;   /* secondary planets */
  var smSz    = unit * 0.10;   /* archive — smaller / distant */

  /*
    Placement inside the arch:
    - Quiz: center-center of arch (this IS the focal point)
    - Map: upper-left (arch narrows here so keep it inset)
    - TX:  upper-right
    - Archive: lower-right, smaller
    Arch is narrower at top, widest at bottom, so
    upper planets need stronger horizontal inset.
  */
  var positions = {
    quiz:    { cx: archCX,             cy: archTop + archHeight * 0.54, sz: quizSz },
    map:     { cx: safeL + safeW*0.18, cy: archTop + archHeight * 0.30, sz: secSz  },
    tx:      { cx: safeL + safeW*0.82, cy: archTop + archHeight * 0.28, sz: secSz  },
    archive: { cx: safeL + safeW*0.80, cy: archTop + archHeight * 0.60, sz: smSz   }
  };

  Object.keys(positions).forEach(function(key) {
    var p  = positions[key];
    var sz = p.sz;
    var e  = pels[key];

    e.wrap.style.left   = (p.cx - sz/2) + 'px';
    e.wrap.style.top    = (p.cy - sz/2) + 'px';
    e.wrap.style.width  = sz + 'px';
    e.wrap.style.height = sz + 'px';

    var gSz = sz * 2.5;
    e.glow.style.width  = gSz + 'px';
    e.glow.style.height = gSz + 'px';

    e.body.style.width  = sz + 'px';
    e.body.style.height = sz + 'px';

    if (e.ring) {
      e.ring.style.width  = (sz * 1.6) + 'px';
      e.ring.style.height = (sz * 0.42) + 'px';
    }

    var rSz = sz * 1.45;
    e.rip.style.width      = rSz + 'px';
    e.rip.style.height     = rSz + 'px';
    e.rip.style.marginLeft = (-rSz/2) + 'px';
    e.rip.style.marginTop  = (-rSz/2) + 'px';

    e.label.style.top = (sz * 0.58) + 'px';
    var mF = Math.max(7, Math.min(11, sz * 0.135));
    var sF = Math.max(6, Math.min(9,  sz * 0.11));
    e.label.querySelector('.pm').style.fontSize = mF + 'px';
    e.label.querySelector('.ps').style.fontSize = sF + 'px';
  });

  /* Title — top of arch, font scales with arch width */
  var titleSize = Math.max(12, Math.min(20, safeW * 0.055));
  var tMain = document.getElementById('t-main-text');
  if (tMain) tMain.style.fontSize = titleSize + 'px';

  /* Yoda — just above dashboard */
  var yodaTop = archBottom - 38;
  yodaEl.style.top = yodaTop + 'px';
  var qF = Math.max(10, Math.min(14, vw * 0.035));
  var qEl = yodaEl.querySelector('.y-quote');
  if (qEl) qEl.style.fontSize = qF + 'px';
}

/* ============================================================
   STARS
   ============================================================ */
function buildStars() {
  for (var i = 0; i < 160; i++) {
    var s   = document.createElement('div');
    s.className = 'star';
    var big = Math.random() < 0.1;
    var sz  = big ? (1.5 + Math.random()*2.2) : (0.3 + Math.random()*1.0);
    var lo  = (0.06 + Math.random()*0.15).toFixed(2);
    var hi  = (0.45 + Math.random()*0.5).toFixed(2);
    var d   = (2  + Math.random()*4.5).toFixed(1) + 's';
    var dl  = (Math.random()*7).toFixed(1) + 's';
    /* Keep stars within the arch area — top 75% vertically, 10%-90% horizontally */
    var lft = (10 + Math.random()*80).toFixed(1);
    var top = (Math.random()*72).toFixed(1);
    s.style.cssText =
      'width:'+sz+'px;height:'+sz+'px;' +
      'left:'+lft+'%;top:'+top+'%;' +
      '--lo:'+lo+';--hi:'+hi+';--d:'+d+';--dl:'+dl+';';
    sl.insertBefore(s, sl.firstChild);
  }
}

/* ============================================================
   NEBULAE
   ============================================================ */
function buildNebulae() {
  [
    { w:360, h:220, t: 5, l: 8,  c:'rgba(60,0,150,0.07)',  nd:'23s' },
    { w:300, h:180, t:12, l:52,  c:'rgba(0,80,200,0.055)', nd:'18s' },
    { w:260, h:150, t:32, l:22,  c:'rgba(170,60,0,0.045)', nd:'28s' }
  ].forEach(function(sp) {
    var n = document.createElement('div');
    n.className = 'nebula';
    n.style.cssText =
      'width:'+sp.w+'px;height:'+sp.h+'px;' +
      'top:'+sp.t+'%;left:'+sp.l+'%;' +
      'background:'+sp.c+';--nd:'+sp.nd+';';
    sl.appendChild(n);
  });
}

/* ============================================================
   FLOAT ANIMATION
   ============================================================ */
var floatPhase = {};
Object.keys(PD).forEach(function(k, i) { floatPhase[k] = Math.random() * Math.PI * 2; });
var ft = 0;
function floatTick() {
  ft += 0.015;
  Object.keys(PD).forEach(function(k, i) {
    var el  = pels[k].wrap;
    var spd = 0.5 + i * 0.12;
    var amp = 3.5 + i * 1.3;
    var dy  = Math.sin(ft * spd + floatPhase[k]) * amp;
    var dx  = Math.cos(ft * spd * 0.55 + floatPhase[k]) * (amp * 0.38);
    el.style.transform = 'translate('+dx.toFixed(2)+'px,'+dy.toFixed(2)+'px)';
  });
  requestAnimationFrame(floatTick);
}

/* ============================================================
   LIGHTSPEED
   ============================================================ */
var lsCanvas = document.getElementById('ls-canvas');
var lsCtx    = lsCanvas.getContext('2d');
var lsRaf    = null;

document.getElementById('lsbtn').addEventListener('click', closeLS);

function launchLS(key) {
  var d = PD[key];
  lsDest = key;
  document.getElementById('ls').classList.add('on');

  lsCanvas.width  = window.innerWidth;
  lsCanvas.height = window.innerHeight;

  var sphere = document.getElementById('lsp');
  var ssz = Math.min(window.innerWidth, window.innerHeight) * 0.38;
  sphere.style.width  = ssz + 'px';
  sphere.style.height = ssz + 'px';
  sphere.style.background = d.gradient;
  sphere.style.setProperty('--g1', d.g1);
  sphere.style.setProperty('--g2', d.g2);
  sphere.style.boxShadow = '0 0 50px '+d.g1+', 0 0 100px '+d.g2;

  document.getElementById('lst').textContent = d.label;
  document.getElementById('lst').style.color = d.color;
  document.getElementById('lss').textContent = d.sub;

  var cx = lsCanvas.width / 2;
  var cy = lsCanvas.height / 2;
  var stars = [];
  for (var i = 0; i < 240; i++) {
    var angle = Math.random() * Math.PI * 2;
    var dist  = 12 + Math.random() * Math.min(cx, cy) * 0.9;
    stars.push({
      angle: angle, dist: dist,
      spd: 0.35 + Math.random()*2.4,
      sz:  0.4  + Math.random()*1.5,
      br:  150  + Math.floor(Math.random()*105)
    });
  }

  var t0    = null;
  var STRE  = 1100;
  var FLASH = 260;
  var phase = 1;

  function frame(ts) {
    if (!t0) t0 = ts;
    var el = ts - t0;
    lsCtx.clearRect(0,0,lsCanvas.width,lsCanvas.height);
    lsCtx.fillStyle = '#000008';
    lsCtx.fillRect(0,0,lsCanvas.width,lsCanvas.height);

    if (phase === 1) {
      var t = Math.min(el/STRE, 1);
      var e = t*t*(3-2*t);
      stars.forEach(function(st) {
        var stretch  = 1 + e*26*st.spd;
        var distNow  = st.dist*(1+e*5.5);
        var sx = cx + Math.cos(st.angle)*distNow;
        var sy = cy + Math.sin(st.angle)*distNow;
        var ex = cx + Math.cos(st.angle)*(distNow+stretch*9);
        var ey = cy + Math.sin(st.angle)*(distNow+stretch*9);
        lsCtx.beginPath();
        lsCtx.moveTo(sx,sy);
        lsCtx.lineTo(ex,ey);
        var b = st.br;
        lsCtx.strokeStyle = 'rgba('+b+','+b+','+Math.min(255,b+45)+','+(0.3+e*0.7)+')';
        lsCtx.lineWidth = st.sz*(1+e*2.8);
        lsCtx.stroke();
      });
      var g = lsCtx.createRadialGradient(cx,cy,0,cx,cy,130*e);
      g.addColorStop(0,'rgba(180,220,255,'+(e*0.55)+')');
      g.addColorStop(1,'transparent');
      lsCtx.fillStyle = g;
      lsCtx.fillRect(0,0,lsCanvas.width,lsCanvas.height);
      if (el >= STRE) { phase=2; t0=ts; }
      lsRaf = requestAnimationFrame(frame);

    } else if (phase === 2) {
      var tf = el/FLASH;
      var op = tf<0.4 ? tf/0.4 : 1-((tf-0.4)/0.6);
      lsCtx.fillStyle = 'rgba(255,255,255,'+Math.max(0,Math.min(1,op))+')';
      lsCtx.fillRect(0,0,lsCanvas.width,lsCanvas.height);
      if (el >= FLASH) {
        document.getElementById('ls-dest').classList.add('show');
        return;
      }
      lsRaf = requestAnimationFrame(frame);
    }
  }
  lsRaf = requestAnimationFrame(frame);
}

function closeLS() {
  document.getElementById('ls-dest').classList.remove('show');
  setTimeout(function() {
    document.getElementById('ls').classList.remove('on');
    if (lsRaf) { cancelAnimationFrame(lsRaf); lsRaf=null; }
    lsCtx.clearRect(0,0,lsCanvas.width,lsCanvas.height);
  }, 400);
  if (lsDest && PD[lsDest].href !== '#') {
    setTimeout(function() { window.location.href = PD[lsDest].href; }, 520);
  }
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  buildStars();
  buildNebulae();
  layout();
  floatTick();
}
window.addEventListener('load', init);
window.addEventListener('resize', layout);

</script>
