<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Star Wars — Which Character Are You?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000008;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
}

/* Layer 1 — deep space */
#space-bg {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: radial-gradient(ellipse 120% 100% at 50% 30%, #03091A 0%, #010408 55%, #000005 100%);
}

/* Layer 2 — stars + planets */
#space-layer {
  position: fixed;
  inset: 0;
  z-index: 2;
  overflow: hidden;
  pointer-events: none;
}

/* Layer 3 — cockpit PNG on top */
#cockpit-frame {
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
  background-image: url('./cockpit-bg.png');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
}

/* ============================================================
   STARS
   ============================================================ */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--d) var(--dl) ease-in-out infinite alternate;
}
@keyframes twinkle {
  from { opacity: var(--lo); transform: scale(0.7); }
  to   { opacity: var(--hi); transform: scale(1.3); }
}

/* ============================================================
   NEBULA
   ============================================================ */
.nebula {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  animation: ndrift var(--nd) ease-in-out infinite alternate;
}
@keyframes ndrift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(14px,-10px) scale(1.08); }
}

/* ============================================================
   PLANETS
   ============================================================ */
.pw {
  position: absolute;
  cursor: pointer;
  pointer-events: all;
  z-index: 6;
  /* size set by JS via width/height on the wrap */
}

/* glow halo behind planet */
.pg {
  position: absolute;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  filter: blur(18px);
  pointer-events: none;
  animation: gpulse var(--gd, 3.5s) ease-in-out infinite alternate;
}
@keyframes gpulse {
  from { opacity: 0.45; transform: translate(-50%,-50%) scale(0.82); }
  to   { opacity: 1;    transform: translate(-50%,-50%) scale(1.18); }
}

/* planet sphere */
.pb {
  border-radius: 50%;
  overflow: hidden;
  position: absolute;
  top: 0; left: 0;
  box-shadow:
    inset -5px -5px 14px rgba(0,0,0,0.6),
    inset 2px 2px 8px rgba(255,255,255,0.13);
  transition: transform 0.12s ease;
}
.pw:active .pb { transform: scale(0.87); }

/* Saturn ring — quiz only */
.pr {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 50%;
  border: 2px solid rgba(255,190,80,0.22);
  transform: translate(-50%,-50%) rotateX(68deg);
  pointer-events: none;
}

/* tap ripple */
.prip {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.55);
  transform: translate(-50%,-50%) scale(0.8);
  opacity: 0;
  pointer-events: none;
}
.pw.tap .prip {
  animation: rip 0.5s ease-out forwards;
}
@keyframes rip {
  from { opacity: 0.8; transform: translate(-50%,-50%) scale(0.8); }
  to   { opacity: 0;   transform: translate(-50%,-50%) scale(2.4); }
}

/* label */
.plabel {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  white-space: nowrap;
  pointer-events: none;
}
.plabel .pm {
  display: block;
  font-family: 'Orbitron', monospace;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 0 12px currentColor, 0 1px 5px rgba(0,0,0,1);
}
.plabel .ps {
  display: block;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  letter-spacing: 1px;
  opacity: 0.65;
  text-shadow: 0 1px 5px rgba(0,0,0,1);
}

/* ============================================================
   LIGHTSPEED
   ============================================================ */
#ls {
  position: fixed;
  inset: 0;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  background: #000008;
}
#ls.on { opacity: 1; pointer-events: all; }

#ls-canvas { position:absolute; inset:0; width:100%; height:100%; }

#ls-dest {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.65s ease;
  padding: 24px;
}
#ls-dest.show { opacity: 1; }

.lsp {
  border-radius: 50%;
  margin-bottom: 30px;
  flex-shrink: 0;
  animation: lspulse 2.2s ease-in-out infinite alternate;
}
@keyframes lspulse {
  from { box-shadow: 0 0 50px var(--g1), 0 0 100px var(--g2); }
  to   { box-shadow: 0 0 90px var(--g1), 0 0 180px var(--g2); }
}
.lst {
  font-family: 'Orbitron', monospace;
  font-size: clamp(20px, 6vw, 28px);
  font-weight: 900;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: white;
  margin-bottom: 8px;
  text-align: center;
}
.lss {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  margin-bottom: 40px;
  text-align: center;
}
.lsbtn {
  padding: 15px 44px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 4px;
  color: white;
  text-transform: uppercase;
  cursor: pointer;
  -webkit-appearance: none;
}
.lsbtn:active {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.6);
}

</style>
</head>
<body>

<div id="space-bg"></div>
<div id="space-layer" id="sl"></div>
<div id="cockpit-frame"></div>

<!-- Lightspeed overlay -->
<div id="ls">
  <canvas id="ls-canvas"></canvas>
  <div id="ls-dest">
    <div class="lsp" id="lsp"></div>
    <div class="lst" id="lst"></div>
    <div class="lss" id="lss"></div>
    <button class="lsbtn" id="lsbtn">ENTER →</button>
  </div>
</div>

<script>

/* ============================================================
   PLANET DATA
   ============================================================ */
var PD = {
  quiz: {
    label: 'TAKE THE QUIZ',
    sub: 'Which character are you?',
    labelColor: '#FFAA44',
    gradient: 'radial-gradient(circle at 36% 32%, #FFCC66, #CC6600 42%, #7A3300 72%, #2A0E00)',
    glowColor: 'rgba(255,140,0,0.45)',
    glowG1: 'rgba(255,140,0,0.75)',
    glowG2: 'rgba(255,90,0,0.28)',
    ring: true,
    glowDur: '3.2s',
    dest: 'quiz.html'
  },
  map: {
    label: 'FORCE MAP',
    sub: 'Your galaxy',
    labelColor: '#44DDFF',
    gradient: 'radial-gradient(circle at 38% 30%, #77EEFF, #0099CC 42%, #004477 72%, #000E1A)',
    glowColor: 'rgba(0,200,255,0.4)',
    glowG1: 'rgba(0,200,255,0.75)',
    glowG2: 'rgba(0,130,255,0.25)',
    ring: false,
    glowDur: '4s',
    dest: '#'
  },
  tx: {
    label: 'TRANSMISSIONS',
    sub: 'Messages from Dad',
    labelColor: '#CC88FF',
    gradient: 'radial-gradient(circle at 38% 30%, #EE99FF, #8822CC 42%, #3A0077 72%, #0E001F)',
    glowColor: 'rgba(180,80,255,0.4)',
    glowG1: 'rgba(180,80,255,0.75)',
    glowG2: 'rgba(130,40,255,0.25)',
    ring: false,
    glowDur: '3.8s',
    dest: '#'
  },
  archive: {
    label: 'ARCHIVE',
    sub: 'Past results',
    labelColor: '#44FF99',
    gradient: 'radial-gradient(circle at 40% 32%, #88FFCC, #00AA55 44%, #004422 72%, #000E07)',
    glowColor: 'rgba(0,220,130,0.4)',
    glowG1: 'rgba(0,220,130,0.75)',
    glowG2: 'rgba(0,160,90,0.25)',
    ring: false,
    glowDur: '4.5s',
    dest: '#'
  }
};

/* ============================================================
   BUILD PLANET ELEMENTS
   ============================================================ */
var planetEls = {};
var sl = document.getElementById('space-layer');

Object.keys(PD).forEach(function(key) {
  var d = PD[key];
  var wrap = document.createElement('div');
  wrap.className = 'pw';
  wrap.id = 'pw-' + key;

  // glow
  var glow = document.createElement('div');
  glow.className = 'pg';
  glow.style.setProperty('--gd', d.glowDur);
  glow.style.background = d.glowColor;

  // body
  var body = document.createElement('div');
  body.className = 'pb';
  body.style.background = d.gradient;

  // ring (quiz only)
  var ring = null;
  if (d.ring) {
    ring = document.createElement('div');
    ring.className = 'pr';
  }

  // ripple
  var rip = document.createElement('div');
  rip.className = 'prip';

  // label
  var label = document.createElement('div');
  label.className = 'plabel';
  label.innerHTML =
    '<span class="pm" style="color:' + d.labelColor + '">' + d.label + '</span>' +
    '<span class="ps" style="color:' + d.labelColor + '">' + d.sub + '</span>';

  wrap.appendChild(glow);
  wrap.appendChild(body);
  if (ring) wrap.appendChild(ring);
  wrap.appendChild(rip);
  wrap.appendChild(label);
  sl.appendChild(wrap);

  planetEls[key] = { wrap: wrap, glow: glow, body: body, ring: ring, rip: rip, label: label };

  // tap handler
  wrap.addEventListener('click', function() {
    wrap.classList.add('tap');
    setTimeout(function() { wrap.classList.remove('tap'); }, 600);
    setTimeout(function() { launchLS(key); }, 480);
  });
});

/* ============================================================
   LAYOUT — responsive, percentage-based
   The cockpit image glass zone:
     Horizontal: ~11% to ~89% of image width
     Vertical:   top to ~76% of image height
   On a phone in portrait, the image is cover-scaled so
   the width fills the screen. We calculate glass zone
   relative to actual rendered size.
   ============================================================ */
function layout() {
  var vw = window.innerWidth;
  var vh = window.innerHeight;

  // Image native ratio is 1376:768 = 1.792
  // On portrait phone (vw < vh), cover means width = vw,
  // height = vw / 1.792. If that's less than vh, height = vh
  // and width = vh * 1.792.
  var imgNativeW = 1376, imgNativeH = 768;
  var imgRatio = imgNativeW / imgNativeH;

  var rendW, rendH, offX, offY;
  if (vw / vh > imgRatio) {
    // viewport wider than image — fit height, crop sides
    rendH = vh;
    rendW = vh * imgRatio;
    offX = (vw - rendW) / 2;
    offY = 0;
  } else {
    // viewport taller than image — fit width, crop top/bottom
    rendW = vw;
    rendH = vw / imgRatio;
    offX = 0;
    offY = (vh - rendH) / 2;
  }

  // Glass zone in rendered image coordinates
  var glassL = offX + rendW * 0.11;
  var glassR = offX + rendW * 0.89;
  var glassT = offY + rendH * 0.02;
  var glassB = offY + rendH * 0.72;  // dashboard starts ~72%

  var gW = glassR - glassL;
  var gH = glassB - glassT;
  var gCX = (glassL + glassR) / 2;

  // Planet sizes — small enough to sit inside panes
  var baseUnit = Math.min(gW, gH);
  var quizSz    = baseUnit * 0.22;   // medium — fits center ring
  var mapSz     = baseUnit * 0.14;
  var txSz      = baseUnit * 0.12;
  var archiveSz = baseUnit * 0.10;

  // Positions — placed in the open glass panes
  // Quiz: center ring — horizontally centered, vertically mid-upper glass
  var positions = {
    quiz:    { cx: gCX,               cy: glassT + gH * 0.52, sz: quizSz },
    map:     { cx: glassL + gW * 0.21, cy: glassT + gH * 0.38, sz: mapSz },
    tx:      { cx: glassL + gW * 0.79, cy: glassT + gH * 0.34, sz: txSz },
    archive: { cx: glassL + gW * 0.78, cy: glassT + gH * 0.62, sz: archiveSz }
  };

  Object.keys(positions).forEach(function(key) {
    var p = positions[key];
    var sz = p.sz;
    var els = planetEls[key];
    var d = PD[key];

    els.wrap.style.cssText =
      'position:absolute;' +
      'left:' + (p.cx - sz/2) + 'px;' +
      'top:' + (p.cy - sz/2) + 'px;' +
      'width:' + sz + 'px;' +
      'height:' + sz + 'px;';

    var glowSz = sz * 2.4;
    els.glow.style.width  = glowSz + 'px';
    els.glow.style.height = glowSz + 'px';

    els.body.style.width  = sz + 'px';
    els.body.style.height = sz + 'px';

    if (els.ring) {
      els.ring.style.width  = (sz * 1.6) + 'px';
      els.ring.style.height = (sz * 0.42) + 'px';
    }

    var ripSz = sz * 1.4;
    els.rip.style.width  = ripSz + 'px';
    els.rip.style.height = ripSz + 'px';
    els.rip.style.marginLeft = (-ripSz/2) + 'px';
    els.rip.style.marginTop  = (-ripSz/2) + 'px';

    // Label position and font sizes
    els.label.style.top = (sz * 0.58) + 'px';
    var mFont = Math.max(7, Math.min(11, sz * 0.13));
    var sFont = Math.max(6, Math.min(9,  sz * 0.11));
    els.label.querySelector('.pm').style.fontSize = mFont + 'px';
    els.label.querySelector('.ps').style.fontSize = sFont + 'px';
  });

  // Reposition Yoda prompt just above dashboard
  var yoda = document.getElementById('yoda');
  if (yoda) {
    yoda.style.top = (glassB - 28) + 'px';
  }
}

/* ============================================================
   STARS
   ============================================================ */
function buildStars() {
  var vw = window.innerWidth, vh = window.innerHeight;
  for (var i = 0; i < 150; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var big = Math.random() < 0.1;
    var sz  = big ? (1.4 + Math.random()*2) : (0.3 + Math.random()*1);
    var lo  = (0.08 + Math.random()*0.18).toFixed(2);
    var hi  = (0.45 + Math.random()*0.5).toFixed(2);
    var d   = (2 + Math.random()*4).toFixed(1) + 's';
    var dl  = (Math.random()*6).toFixed(1) + 's';
    s.style.cssText =
      'width:' + sz + 'px;height:' + sz + 'px;' +
      'left:' + (10 + Math.random()*80) + '%;' +
      'top:'  + (Math.random()*72) + '%;' +
      '--lo:' + lo + ';--hi:' + hi + ';--d:' + d + ';--dl:' + dl + ';';
    sl.insertBefore(s, sl.firstChild);
  }
}

/* ============================================================
   NEBULAE
   ============================================================ */
function buildNebulae() {
  var specs = [
    { w:320, h:190, t:8,  l:4,  c:'rgba(70,0,160,0.07)',  nd:'22s' },
    { w:280, h:160, t:18, l:55, c:'rgba(0,90,200,0.055)', nd:'17s' },
    { w:240, h:130, t:35, l:28, c:'rgba(180,60,0,0.045)', nd:'26s' }
  ];
  specs.forEach(function(sp) {
    var n = document.createElement('div');
    n.className = 'nebula';
    n.style.cssText =
      'width:' + sp.w + 'px;height:' + sp.h + 'px;' +
      'top:' + sp.t + '%;left:' + sp.l + '%;' +
      'background:' + sp.c + ';--nd:' + sp.nd + ';';
    sl.appendChild(n);
  });
}

/* ============================================================
   PLANET FLOAT
   ============================================================ */
var floatPhase = {};
Object.keys(PD).forEach(function(k, i) {
  floatPhase[k] = Math.random() * Math.PI * 2;
});
var floatT = 0;
function floatTick() {
  floatT += 0.016;
  Object.keys(PD).forEach(function(k, i) {
    var el = planetEls[k].wrap;
    var speed = 0.55 + i * 0.12;
    var amp   = 3.5 + i * 1.2;
    var dy = Math.sin(floatT * speed + floatPhase[k]) * amp;
    var dx = Math.cos(floatT * speed * 0.55 + floatPhase[k]) * (amp * 0.35);
    el.style.transform = 'translate(' + dx.toFixed(2) + 'px,' + dy.toFixed(2) + 'px)';
  });
  requestAnimationFrame(floatTick);
}

/* ============================================================
   LIGHTSPEED
   ============================================================ */
var lsCanvas = document.getElementById('ls-canvas');
var lsCtx    = lsCanvas.getContext('2d');
var lsRaf    = null;
var lsDest   = null;

document.getElementById('lsbtn').addEventListener('click', function() {
  closeLS();
});

function launchLS(key) {
  var d = PD[key];
  lsDest = key;
  var overlay = document.getElementById('ls');
  overlay.classList.add('on');

  lsCanvas.width  = window.innerWidth;
  lsCanvas.height = window.innerHeight;

  // Set destination visuals
  var sphere = document.getElementById('lsp');
  sphere.style.background = d.gradient;
  sphere.style.setProperty('--g1', d.glowG1);
  sphere.style.setProperty('--g2', d.glowG2);
  var sphereSz = Math.min(window.innerWidth, window.innerHeight) * 0.38;
  sphere.style.width  = sphereSz + 'px';
  sphere.style.height = sphereSz + 'px';
  sphere.style.boxShadow = '0 0 50px ' + d.glowG1 + ', 0 0 100px ' + d.glowG2;

  document.getElementById('lst').textContent = PD[key].label;
  document.getElementById('lst').style.color = d.labelColor;
  document.getElementById('lss').textContent = d.sub;

  // Generate ls stars
  var cx = lsCanvas.width / 2;
  var cy = lsCanvas.height / 2;
  var stars = [];
  for (var i = 0; i < 240; i++) {
    var angle = Math.random() * Math.PI * 2;
    var dist  = 12 + Math.random() * Math.min(cx, cy) * 0.9;
    stars.push({
      angle: angle,
      dist:  dist,
      spd:   0.35 + Math.random() * 2.4,
      sz:    0.4  + Math.random() * 1.5,
      br:    155  + Math.floor(Math.random() * 100)
    });
  }

  var start = null;
  var STRETCH = 1100;
  var FLASH   = 260;
  var phase   = 1;

  function frame(ts) {
    if (!start) start = ts;
    var el = ts - start;

    lsCtx.clearRect(0, 0, lsCanvas.width, lsCanvas.height);
    lsCtx.fillStyle = '#000008';
    lsCtx.fillRect(0, 0, lsCanvas.width, lsCanvas.height);

    if (phase === 1) {
      var t = Math.min(el / STRETCH, 1);
      var e = t * t * (3 - 2 * t);

      stars.forEach(function(st) {
        var stretch  = 1 + e * 26 * st.spd;
        var distNow  = st.dist * (1 + e * 5.5);
        var sx = cx + Math.cos(st.angle) * distNow;
        var sy = cy + Math.sin(st.angle) * distNow;
        var ex = cx + Math.cos(st.angle) * (distNow + stretch * 9);
        var ey = cy + Math.sin(st.angle) * (distNow + stretch * 9);

        lsCtx.beginPath();
        lsCtx.moveTo(sx, sy);
        lsCtx.lineTo(ex, ey);
        var b = st.br;
        var blue = Math.min(255, b + 45);
        lsCtx.strokeStyle = 'rgba(' + b + ',' + b + ',' + blue + ',' + (0.3 + e * 0.7) + ')';
        lsCtx.lineWidth   = st.sz * (1 + e * 2.8);
        lsCtx.stroke();
      });

      // center glow
      var g = lsCtx.createRadialGradient(cx, cy, 0, cx, cy, 130 * e);
      g.addColorStop(0, 'rgba(180,220,255,' + (e * 0.55) + ')');
      g.addColorStop(1, 'transparent');
      lsCtx.fillStyle = g;
      lsCtx.fillRect(0, 0, lsCanvas.width, lsCanvas.height);

      if (el >= STRETCH) { phase = 2; start = ts; }
      lsRaf = requestAnimationFrame(frame);

    } else if (phase === 2) {
      var tf = el / FLASH;
      var op = tf < 0.4 ? tf / 0.4 : 1 - ((tf - 0.4) / 0.6);
      lsCtx.fillStyle = 'rgba(255,255,255,' + Math.max(0, Math.min(1, op)) + ')';
      lsCtx.fillRect(0, 0, lsCanvas.width, lsCanvas.height);

      if (el >= FLASH) {
        document.getElementById('ls-dest').classList.add('show');
        return;
      }
      lsRaf = requestAnimationFrame(frame);
    }
  }

  lsRaf = requestAnimationFrame(frame);
}

function closeLS() {
  var dest = document.getElementById('ls-dest');
  dest.classList.remove('show');
  setTimeout(function() {
    document.getElementById('ls').classList.remove('on');
    if (lsRaf) { cancelAnimationFrame(lsRaf); lsRaf = null; }
    lsCtx.clearRect(0, 0, lsCanvas.width, lsCanvas.height);
  }, 400);

  // Navigate to destination
  if (lsDest && PD[lsDest].dest !== '#') {
    setTimeout(function() {
      window.location.href = PD[lsDest].dest;
    }, 500);
  }
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  buildStars();
  buildNebulae();
  layout();
  floatTick();
}

window.addEventListener('load', init);
window.addEventListener('resize', layout);

</script>
</body>
</html>
